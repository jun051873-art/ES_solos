<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專屬空間沙龍 - 黑金1號 (Physical Liquid)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --primary: #464646;
            --accent: #D4AF37;
            --bg-base: #F5F5F7;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-base);
            margin: 0;
            overflow: hidden;
        }

        /* --- 核心：液態水晶物理指示器 --- */
        .glass-indicator {
            position: absolute;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 1.25rem;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05), inset 0 0 10px rgba(255,255,255,0.5);
            /* 物理卡入動畫：貝茲曲線決定了它會「彈」一下 */
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.2);
            z-index: 0;
            pointer-events: none;
        }

        /* 點擊時的壓縮感 (Active) */
        .is-pressing {
            transform: scale(0.92) translateY(2px);
            background: rgba(255, 255, 255, 0.8);
            transition: transform 0.1s ease;
        }

        .menu-btn {
            position: relative;
            z-index: 1;
            background: transparent;
            transition: color 0.3s ease;
        }

        .active-text {
            color: #000 !important;
            font-weight: 900;
        }

        .text-gold-gradient {
            background: linear-gradient(90deg, #b8860b, #D4AF37, #b8860b);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const HairSalonApp = () => {
            const [activeTab, setActiveTab] = useState('開單');
            const [indicatorStyle, setIndicatorStyle] = useState({ top: 0, height: 0, width: 0, left: 0 });
            const [isPressing, setIsPressing] = useState(false);
            const btnRefs = useRef({});

            const menuItems = ['開單', '查單', '報表', '顧客', '庫存', '人員', '系統'];

            // 物理吸附邏輯：計算當前選中按鈕的位置
            useEffect(() => {
                const activeBtn = btnRefs.current[activeTab];
                if (activeBtn) {
                    setIndicatorStyle({
                        top: activeBtn.offsetTop,
                        left: activeBtn.offsetLeft,
                        width: activeBtn.offsetWidth,
                        height: activeBtn.offsetHeight
                    });
                }
            }, [activeTab]);

            const formatCurrency = (n) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(n);

            return (
                <div className="flex h-screen w-screen overflow-hidden bg-[#F5F5F7]">
                    {/* 側邊欄 */}
                    <aside style={{ minWidth: '120px' }} className="flex flex-col w-24 hover:w-64 bg-white/40 border-r border-gray-200 shadow-sm transition-all duration-300 group overflow-hidden flex-shrink-0 relative">
                        <div className="p-6 h-20 border-b border-gray-100 flex items-center gap-4 relative z-10">
                            <div className="w-10 h-10 bg-black rounded-xl flex items-center justify-center text-[#D4AF37] font-black text-xl">S</div>
                            <span className="font-bold opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Salon POS</span>
                        </div>

                        <nav className="flex-1 p-4 space-y-2 relative">
                            {/* 那塊會動的水滴背景 */}
                            <div 
                                className={`glass-indicator ${isPressing ? 'is-pressing' : ''}`}
                                style={{
                                    top: `${indicatorStyle.top}px`,
                                    left: `${indicatorStyle.left}px`,
                                    width: `${indicatorStyle.width}px`,
                                    height: `${indicatorStyle.height}px`
                                }}
                            ></div>

                            {menuItems.map(item => (
                                <button 
                                    key={item}
                                    ref={el => btnRefs.current[item] = el}
                                    onPointerDown={() => setIsPressing(true)}
                                    onPointerUp={() => setIsPressing(false)}
                                    onClick={() => setActiveTab(item)}
                                    className={`w-full py-4 px-4 rounded-2xl flex items-center gap-4 menu-btn ${activeTab === item ? 'active-text' : 'text-gray-400'}`}
                                >
                                    <div className="w-6 h-6 bg-current opacity-20 rounded-md"></div>
                                    <span className="opacity-0 group-hover:opacity-100 transition-all whitespace-nowrap">{item}</span>
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* 主區域 */}
                    <main className="flex-1 p-6 flex flex-col gap-6 overflow-hidden animate-fade-in">
                        <div className="flex-1 bg-white/60 backdrop-blur-xl border border-white rounded-[2.5rem] p-10 overflow-y-auto hide-scrollbar">
                            <h2 className="text-4xl font-black text-gold-gradient mb-8">{activeTab}管理</h2>
                            <div className="p-20 text-center text-gray-300 font-black text-2xl border-2 border-dashed border-gray-100 rounded-[2rem]">
                                {activeTab} 模組開發中...
                            </div>
                        </div>
                        
                        <div className="h-[150px] bg-white/80 backdrop-blur-xl border border-white rounded-[2.5rem] p-10 flex items-center justify-between">
                            <div className="flex flex-col">
                                <span className="text-gray-400 font-bold text-sm uppercase">Quick Action</span>
                                <span className="text-4xl font-black text-gold-gradient">等待指令打磨...</span>
                            </div>
                            <button className="bg-black text-[#D4AF37] px-12 py-5 rounded-[1.5rem] text-xl font-black shadow-xl active:scale-95 transition-all">
                                點擊測試
                            </button>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HairSalonApp />);
    </script>
</body>
</html>
