<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Salon POS - 黑金1號</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { --primary: #1C1C1E; --accent: #D4AF37; --bg-ios: #F2F2F7; }
        body { 
            font-family: -apple-system, 'Noto Sans TC', sans-serif; 
            background: var(--bg-ios); margin: 0; overflow: hidden; 
            -webkit-user-select: none; user-select: none;
        }
        *::-webkit-scrollbar { display: none !important; }

        .glass-indicator {
            position: absolute;
            background: rgba(255, 255, 255, 0.5); 
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 1.25rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
            transition: all 0.45s cubic-bezier(0.18, 0.89, 0.32, 1.2);
            z-index: 0; pointer-events: none;
        }

        .staff-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 2.5rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; overflow: hidden;
        }

        .input-ios {
            width: 100%; background: rgba(255,255,255,0.8); border: 1px solid #E5E5EA;
            border-radius: 1rem; padding: 0.85rem 1rem; outline: none; transition: all 0.2s;
            -webkit-appearance: none; font-size: 16px;
        }
        .input-ios:focus { border-color: var(--accent); background: white; }

        .text-gold-gradient {
            background: linear-gradient(135deg, #b8860b, #D4AF37, #fdf5e6, #D4AF37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        @media (max-width: 768px) {
            .mobile-hide { display: none !important; }
            .mobile-bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(255,255,255,0.8); backdrop-filter: blur(20px); border-top: 0.5px solid #ddd; z-index: 1000; display: flex; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const HairSalonApp = () => {
            const [activeTab, setActiveTab] = useState('人員');
            const [indicatorStyle, setIndicatorStyle] = useState({ top: 0, height: 0, width: 0, left: 0 });
            const btnRefs = useRef({});

            // --- 資料持久化：從 localStorage 讀取 ---
            const [staffList, setStaffList] = useState(() => {
                const saved = localStorage.getItem('salon_staff_v1');
                return saved ? JSON.parse(saved) : [
                    { id: '1', name: '小刀', role: '設計師', baseSalary: 30000, bonus: 5000, fullAttendance: 2000, commissionType: '個別設定', commissionValue: 35, color: '#D4AF37', note: '主攻液態造型' }
                ];
            });

            useEffect(() => {
                localStorage.setItem('salon_staff_v1', JSON.stringify(staffList));
            }, [staffList]);

            const [showAddModal, setShowAddModal] = useState(false);
            const [editingStaff, setEditingStaff] = useState(null);

            const initialForm = { 
                name: '', role: '設計師', customRole: '', baseSalary: '', bonus: '', 
                fullAttendance: '', commissionType: '全店統一', commissionValue: '', 
                color: '#D4AF37', note: '' 
            };
            const [form, setForm] = useState(initialForm);

            // 側邊欄物理跟隨
            useEffect(() => {
                const activeBtn = btnRefs.current[activeTab];
                if (activeBtn) {
                    setIndicatorStyle({ top: activeBtn.offsetTop, left: activeBtn.offsetLeft, width: activeBtn.offsetWidth, height: activeBtn.offsetHeight });
                }
            }, [activeTab]);

            // --- 核心：修正後的儲存邏輯 ---
            const handleSaveStaff = () => {
                if (!form.name.trim()) { alert("請輸入夥伴姓名"); return; }
                
                const finalRole = form.role === '其他' ? form.customRole : form.role;
                const newStaff = { 
                    ...form, 
                    id: editingStaff ? editingStaff.id : Date.now().toString(),
                    role: finalRole,
                    baseSalary: Number(form.baseSalary) || 0,
                    bonus: Number(form.bonus) || 0,
                    fullAttendance: Number(form.fullAttendance) || 0,
                    commissionValue: Number(form.commissionValue) || 0
                };

                if (editingStaff) {
                    setStaffList(prev => prev.map(s => s.id === editingStaff.id ? newStaff : s));
                } else {
                    setStaffList(prev => [...prev, newStaff]);
                }
                
                setShowAddModal(false);
                setEditingStaff(null);
                setForm(initialForm);
            };

            const handleDelete = (id, name) => {
                if (window.confirm(`確定要刪除夥伴「${name}」嗎？`)) {
                    setStaffList(prev => prev.filter(s => s.id !== id));
                }
            };

            const menuItems = ['開單', '查單', '報表', '顧客', '庫存', '人員', '系統'];

            return (
                <div className="flex h-screen w-screen overflow-hidden bg-[#F2F2F7]">
                    {/* 側邊導覽 */}
                    <aside style={{ minWidth: '120px' }} className="mobile-hide flex flex-col w-24 hover:w-64 bg-white/30 border-r border-gray-200/50 backdrop-blur-md transition-all duration-300 group overflow-hidden flex-shrink-0 relative">
                        <div className="p-6 h-20 flex items-center gap-4 relative z-10">
                            <div className="w-10 h-10 bg-black rounded-xl flex items-center justify-center text-[#D4AF37] font-black text-xl shadow-lg">S</div>
                            <span className="font-bold text-[#1C1C1E] opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Salon POS</span>
                        </div>
                        <nav className="flex-1 p-4 space-y-2 relative">
                            <div className="glass-indicator" style={{ top: `${indicatorStyle.top}px`, left: `${indicatorStyle.left}px`, width: `${indicatorStyle.width}px`, height: `${indicatorStyle.height}px` }}></div>
                            {menuItems.map(item => (
                                <button key={item} ref={el => btnRefs.current[item] = el} onClick={() => setActiveTab(item)} className={`w-full py-4 px-4 rounded-2xl flex items-center gap-4 transition-all relative z-10 ${activeTab === item ? 'text-black font-bold' : 'text-gray-400'}`}>
                                    <div className={`w-6 h-6 rounded-md ${activeTab === item ? 'bg-[#D4AF37]/20' : 'bg-gray-300/30'}`}></div>
                                    <span className="opacity-0 group-hover:opacity-100 transition-all whitespace-nowrap">{item}</span>
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* 主畫面 */}
                    <main className="flex-1 p-4 md:p-6 flex flex-col gap-6 overflow-hidden relative">
                        <div className="flex-1 bg-white/50 backdrop-blur-2xl border border-white/80 rounded-[2.5rem] p-6 md:p-10 shadow-sm relative overflow-hidden flex flex-col">
                             <div className="absolute -top-20 -right-20 w-64 h-64 bg-[#D4AF37]/10 blur-[80px] rounded-full"></div>
                             
                             {activeTab === '人員' && (
                                <div className="h-full flex flex-col">
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-3xl md:text-4xl font-black text-gold-gradient tracking-tight">人員管理</h2>
                                        <button onClick={() => { setForm(initialForm); setShowAddModal(true); }} className="bg-[#1C1C1E] text-[#D4AF37] px-6 md:px-8 py-3 rounded-2xl font-black shadow-lg hover:scale-105 transition-all">+ 新增人員</button>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 overflow-y-auto pb-10">
                                        {staffList.map(staff => (
                                            <div key={staff.id} className="staff-card p-6 animate-fade-in shadow-sm">
                                                <div className="absolute top-0 right-0 w-24 h-24 bg-opacity-10 rounded-bl-full" style={{ backgroundColor: staff.color }}></div>
                                                <div className="flex justify-between items-start mb-4">
                                                    <div>
                                                        <span className="px-3 py-1 rounded-full text-[10px] font-bold text-white mb-2 inline-block" style={{ backgroundColor: staff.color }}>{staff.role}</span>
                                                        <h3 className="text-2xl font-black text-[#1C1C1E]">{staff.name}</h3>
                                                    </div>
                                                    <div className="flex space-x-2 relative z-10">
                                                        <button onClick={() => { setEditingStaff(staff); setForm(staff); setShowAddModal(true); }} className="w-9 h-9 bg-white rounded-full shadow-sm flex items-center justify-center hover:text-[#D4AF37]">✎</button>
                                                        <button onClick={() => handleDelete(staff.id, staff.name)} className="w-9 h-9 bg-white rounded-full shadow-sm flex items-center justify-center hover:text-red-500">✕</button>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-2 text-xs font-bold text-gray-500 mb-4">
                                                    <div className="flex flex-col"><span>底薪</span><b className="text-gray-800 text-sm">${staff.baseSalary}</b></div>
                                                    <div className="flex flex-col text-right"><span>抽成比例</span><b className="text-[#D4AF37] text-sm">{staff.commissionType === '個別設定' ? `${staff.commissionValue}%` : '全店統一'}</b></div>
                                                </div>
                                                <div className="p-3 bg-white/40 rounded-2xl border border-white border-dashed text-[11px] text-gray-500 min-h-[50px]">
                                                    <span className="font-black text-gray-400 block mb-1">備忘錄</span>
                                                    {staff.note || '暫無內容'}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                             )}
                        </div>
                    </main>

                    {/* 手機底部導覽 */}
                    <div className="lg:hidden mobile-bottom-nav">
                        {['開單', '報表', '人員'].map(item => (
                            <button key={item} onClick={() => setActiveTab(item)} className={`flex flex-col items-center gap-1 ${activeTab === item ? 'text-[#D4AF37]' : 'text-gray-400'}`}>
                                <div className="w-6 h-6 bg-current opacity-30 rounded-lg"></div>
                                <span className="text-[10px] font-bold">{item}</span>
                            </button>
                        ))}
                    </div>

                    {/* 新增夥伴 Modal */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-md z-[2000] flex items-center justify-center p-4">
                            <div className="bg-[#F2F2F7] w-full max-w-lg rounded-[2.5rem] p-8 md:p-10 shadow-2xl animate-fade-in overflow-y-auto max-h-[90vh]">
                                <h3 className="text-2xl font-black mb-8 text-gold-gradient">{editingStaff ? '修改人員資料' : '新增夥伴'}</h3>
                                <div className="space-y-5">
                                    <div><label className="text-[10px] font-bold text-gray-400 ml-2">人員姓名</label><input className="input-ios" value={form.name} onChange={e=>setForm({...form, name: e.target.value})}/></div>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-[10px] font-bold text-gray-400 ml-2">職位</label>
                                            <select className="input-ios" value={form.role} onChange={e=>setForm({...form, role: e.target.value})}>
                                                <option>設計師</option><option>助手</option><option>店長</option><option>兼職</option><option>其他</option>
                                            </select>
                                        </div>
                                        {form.role === '其他' && <div><label className="text-[10px] font-bold text-gray-400 ml-2">自訂名稱</label><input className="input-ios" value={form.customRole} onChange={e=>setForm({...form, customRole: e.target.value})}/></div>}
                                    </div>

                                    <div className="grid grid-cols-3 gap-3">
                                        <div><label className="text-[10px] font-bold text-gray-400 ml-2">底薪</label><input type="number" className="input-ios" value={form.baseSalary} onChange={e=>setForm({...form, baseSalary: e.target.value})}/></div>
                                        <div><label className="text-[10px] font-bold text-gray-400 ml-2">加給</label><input type="number" className="input-ios" value={form.bonus} onChange={e=>setForm({...form, bonus: e.target.value})}/></div>
                                        <div><label className="text-[10px] font-bold text-gray-400 ml-2">全勤</label><input type="number" className="input-ios" value={form.fullAttendance} onChange={e=>setForm({...form, fullAttendance: e.target.value})}/></div>
                                    </div>

                                    <div className="p-5 bg-white/50 rounded-3xl border border-white">
                                        <label className="text-[10px] font-bold text-gray-400 mb-3 block">抽成模式</label>
                                        <div className="flex gap-6 mb-3">
                                            <label className="flex items-center space-x-2 text-sm font-bold"><input type="radio" checked={form.commissionType === '全店統一'} onChange={()=>setForm({...form, commissionType:'全店統一'})}/> <span>全店統一</span></label>
                                            <label className="flex items-center space-x-2 text-sm font-bold"><input type="radio" checked={form.commissionType === '個別設定'} onChange={()=>setForm({...form, commissionType:'個別設定'})}/> <span>個別設定</span></label>
                                        </div>
                                        {form.commissionType === '個別設定' && <input type="number" placeholder="輸入比例 %" className="input-ios animate-fade-in" value={form.commissionValue} onChange={e=>setForm({...form, commissionValue: e.target.value})}/>}
                                    </div>

                                    <div className="flex items-center gap-4">
                                        <div><label className="text-[10px] font-bold text-gray-400 block mb-1">顏色</label><input type="color" className="w-12 h-10 bg-transparent cursor-pointer border-none" value={form.color} onChange={e=>setForm({...form, color: e.target.value})}/></div>
                                        <div className="flex-1"><label className="text-[10px] font-bold text-gray-400 ml-2">備忘錄</label><input className="input-ios" value={form.note} onChange={e=>setForm({...form, note: e.target.value})}/></div>
                                    </div>

                                    <div className="flex gap-4 pt-6 border-t border-gray-200">
                                        <button onClick={() => {setShowAddModal(false); setEditingStaff(null);}} className="flex-1 py-4 font-bold text-gray-400">取消</button>
                                        <button onClick={handleSaveStaff} className="flex-1 py-4 bg-[#1C1C1E] text-[#D4AF37] rounded-[1.5rem] font-black shadow-xl active:scale-95 transition-all">確認存檔</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HairSalonApp />);
    </script>
</body>
</html>
