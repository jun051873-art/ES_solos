<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Salon POS - 黑金1號 (iOS 26 Liquid Final)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --primary: #1C1C1E;
            --accent: #D4AF37;
            --bg-ios: #F2F2F7;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-blur: blur(25px) saturate(210%);
        }

        body {
            font-family: -apple-system, 'Noto Sans TC', sans-serif;
            background: var(--bg-ios);
            margin: 0;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        *::-webkit-scrollbar { display: none !important; }

        .liquid-glass {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 0.5px solid rgba(255, 255, 255, 0.7);
            border-top: 1.5px solid rgba(255, 255, 255, 0.9);
            border-radius: 2rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-indicator {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 1.25rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.2);
            z-index: 0; pointer-events: none;
        }

        .input-ios {
            width: 100%; background: rgba(255, 255, 255, 0.85); border: 1px solid #E5E5EA;
            border-radius: 1.25rem; padding: 0.85rem 1.25rem; outline: none; transition: all 0.2s;
            font-size: 16px;
        }
        .input-ios:focus { border-color: var(--accent); background: white; }

        .text-gold-gradient {
            background: linear-gradient(135deg, #b8860b, #D4AF37, #fdf5e6, #D4AF37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .btn-glass-white {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-radius: 1.5rem;
            font-weight: 900;
            color: #1C1C1E;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const HairSalonApp = () => {
            const [activeTab, setActiveTab] = useState('人員');
            const [indicatorStyle, setIndicatorStyle] = useState({ top: 0, height: 0, width: 0, left: 0 });
            const [staffList, setStaffList] = useState([
                { id: '1', name: '小刀', role: '店長', baseSalary: '30000', jobBonus: '5000', attendanceBonus: '2000', allowance: '1000', commissionType: '個別設定', commissionValue: '35', color: '#D4AF37', note: '液態玻璃風格指導' }
            ]);
            const [showAddModal, setShowAddModal] = useState(false);
            const [editingStaff, setEditingStaff] = useState(null);
            const btnRefs = useRef({});

            const initialForm = { 
                name: '', role: '設計師', customRole: '', 
                baseSalary: '', jobBonus: '', attendanceBonus: '', allowance: '', 
                commissionType: '全店統一', commissionValue: '', color: '#D4AF37', note: '' 
            };
            const [form, setForm] = useState(initialForm);

            const menuItems = ['開單', '查單', '報表', '顧客', '庫存', '人員', '系統'];

            useEffect(() => {
                const activeBtn = btnRefs.current[activeTab];
                if (activeBtn) {
                    setIndicatorStyle({ top: activeBtn.offsetTop, left: activeBtn.offsetLeft, width: activeBtn.offsetWidth, height: activeBtn.offsetHeight });
                }
            }, [activeTab]);

            const handleSaveStaff = () => {
                if (!form.name.trim()) return alert("請輸入夥伴姓名");
                const finalRole = form.role === '其他' ? form.customRole : form.role;
                const newStaffData = { ...form, id: editingStaff ? editingStaff.id : Date.now().toString(), role: finalRole };

                if (editingStaff) {
                    setStaffList(prev => prev.map(s => s.id === editingStaff.id ? newStaffData : s));
                } else {
                    setStaffList(prev => [...prev, newStaffData]);
                }
                setShowAddModal(false);
                setEditingStaff(null);
                setForm(initialForm);
            };

            const handleDelete = (id, name) => {
                if (window.confirm(`確定要刪除夥伴「${name}」嗎？`)) {
                    setStaffList(prev => prev.filter(s => s.id !== id));
                }
            };

            return (
                <div className="flex h-screen w-screen overflow-hidden bg-[#F2F2F7]">
                    <aside style={{ minWidth: '120px' }} className="flex flex-col w-24 hover:w-64 bg-white/20 border-r border-gray-200 backdrop-blur-md transition-all duration-300 group overflow-hidden flex-shrink-0 relative">
                        <div className="p-6 h-20 flex items-center gap-4 relative z-10">
                            <div className="w-10 h-10 bg-white/60 backdrop-blur-md border border-white/80 rounded-xl flex items-center justify-center text-[#D4AF37] font-black text-xl shadow-sm">S</div>
                            <span className="font-bold text-[#1C1C1E] opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Salon POS</span>
                        </div>
                        <nav className="flex-1 p-4 space-y-2 relative">
                            <div className="glass-indicator" style={{ top: indicatorStyle.top, left: indicatorStyle.left, width: indicatorStyle.width, height: indicatorStyle.height }}></div>
                            {menuItems.map(item => (
                                <button key={item} ref={el => btnRefs.current[item] = el} onClick={() => setActiveTab(item)} className={`w-full py-4 px-4 rounded-2xl flex items-center gap-4 transition-all relative z-10 ${activeTab === item ? 'text-black font-bold' : 'text-gray-400'}`}>
                                    <div className={`w-6 h-6 rounded-md ${activeTab === item ? 'bg-[#D4AF37]/20' : 'bg-gray-300/30'}`}></div>
                                    <span className="opacity-0 group-hover:opacity-100 transition-all whitespace-nowrap font-medium text-sm">{item}</span>
                                </button>
                            ))}
                        </nav>
                    </aside>

                    <main className="flex-1 p-6 flex flex-col gap-6 overflow-hidden animate-fade-in">
                        <div className="flex-1 liquid-glass p-10 overflow-hidden flex flex-col relative">
                             <div className="absolute -top-40 -right-40 w-96 h-96 bg-[#D4AF37]/10 blur-[120px] rounded-full"></div>
                             
                             {activeTab === '人員' ? (
                                <div className="h-full flex flex-col">
                                    <div className="flex justify-between items-center mb-10 relative z-10">
                                        <h2 className="text-4xl font-black text-gold-gradient tracking-tight">人員管理</h2>
                                        <button onClick={() => { setForm(initialForm); setShowAddModal(true); }} className="btn-glass-white px-8 py-3 hover:scale-105 active:scale-95 transition-all shadow-lg">+ 新增夥伴</button>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 overflow-y-auto pb-10">
                                        {staffList.map(staff => (
                                            <div key={staff.id} className="liquid-glass p-8 bg-white/40 hover:bg-white/70 animate-fade-in">
                                                <div className="absolute top-0 right-0 w-24 h-24 bg-opacity-10 rounded-bl-full" style={{ backgroundColor: staff.color }}></div>
                                                <div className="flex justify-between items-start mb-6">
                                                    <div>
                                                        <span className="px-3 py-1 rounded-full text-[10px] font-bold text-white mb-2 inline-block shadow-sm" style={{ backgroundColor: staff.color }}>{staff.role}</span>
                                                        <h3 className="text-3xl font-black text-[#1C1C1E]">{staff.name}</h3>
                                                    </div>
                                                    <div className="flex space-x-2 relative z-10">
                                                        <button onClick={() => { setEditingStaff(staff); setForm(staff); setShowAddModal(true); }} className="w-10 h-10 bg-white/80 rounded-full flex items-center justify-center shadow-sm hover:text-[#D4AF37] transition-all">✎</button>
                                                        <button onClick={() => handleDelete(staff.id, staff.name)} className="w-10 h-10 bg-white/80 rounded-full flex items-center justify-center shadow-sm hover:text-red-500 transition-all">✕</button>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-2 gap-y-4 text-[13px] font-bold text-gray-500 mb-6 border-b border-white/50 pb-4">
                                                    <div className="flex flex-col"><span>底薪</span><b className="text-gray-800">${staff.baseSalary || 0}</b></div>
                                                    <div className="flex flex-col"><span>全勤獎金</span><b className="text-gray-800">${staff.attendanceBonus || 0}</b></div>
                                                    <div className="flex flex-col"><span>職務加給</span><b className="text-gray-800">${staff.jobBonus || 0}</b></div>
                                                    <div className="flex flex-col"><span>各項津貼</span><b className="text-gray-800">${staff.allowance || 0}</b></div>
                                                    <div className="flex flex-col col-span-2"><span>抽成邏輯</span><b className="text-[#D4AF37]">{staff.commissionType === '個別設定' ? `${staff.commissionValue}% (保底)` : '全店統一'}</b></div>
                                                </div>

                                                <div className="p-4 bg-white/30 rounded-2xl border border-white border-dashed text-xs text-gray-500 min-h-[60px]">
                                                    <span className="font-black text-gray-400 block mb-1 uppercase tracking-widest text-[10px]">MEMO</span>
                                                    {staff.note || '尚無紀錄'}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                             ) : (
                                <div className="flex-1 flex flex-col items-center justify-center text-gray-400 font-bold text-xl border-2 border-dashed border-gray-200/50 rounded-[2.5rem]">{activeTab} 模組打磨中...</div>
                             )}
                        </div>
                    </main>

                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-md z-[2000] flex items-center justify-center p-4">
                            <div className="liquid-glass w-full max-w-xl p-10 bg-[#F2F2F7] animate-fade-in max-h-[90vh] overflow-y-auto">
                                <h3 className="text-2xl font-black mb-8 text-gold-gradient">{editingStaff ? '修改人員資料' : '新增團隊夥伴'}</h3>
                                <div className="space-y-6">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-2"><label className="text-[10px] font-black text-gray-400 ml-2">姓名</label><input className="input-ios" value={form.name} onChange={e=>setForm({...form, name:e.target.value})}/></div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-gray-400 ml-2">職位</label>
                                            <select className="input-ios" value={form.role} onChange={e=>setForm({...form, role:e.target.value})}>
                                                <option>設計師</option><option>助手</option><option>店長</option><option>兼職</option><option>其他</option>
                                            </select>
                                        </div>
                                    </div>

                                    {form.role === '其他' && <div className="animate-fade-in"><label className="text-[10px] font-black text-gray-400 ml-2">自定義職位名稱</label><input className="input-ios" value={form.customRole} onChange={e=>setForm({...form, customRole:e.target.value})}/></div>}
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div><label className="text-[10px] font-black text-gray-400 ml-2">底薪</label><input type="number" className="input-ios" value={form.baseSalary} onChange={e=>setForm({...form, baseSalary:e.target.value})}/></div>
                                        <div><label className="text-[10px] font-black text-gray-400 ml-2">職務加給</label><input type="number" className="input-ios" value={form.jobBonus} onChange={e=>setForm({...form, jobBonus:e.target.value})}/></div>
                                        <div><label className="text-[10px] font-black text-gray-400 ml-2">全勤獎金</label><input type="number" className="input-ios" value={form.attendanceBonus} onChange={e=>setForm({...form, attendanceBonus:e.target.value})}/></div>
                                        <div><label className="text-[10px] font-black text-gray-400 ml-2">各項津貼</label><input type="number" className="input-ios" value={form.allowance} onChange={e=>setForm({...form, allowance:e.target.value})}/></div>
                                    </div>

                                    <div className="p-6 bg-white/60 rounded-[2rem] border border-white">
                                        <label className="text-[10px] font-black text-gray-400 mb-3 block">抽成邏輯</label>
                                        <div className="flex gap-8 mb-4">
                                            <label className="flex items-center space-x-2 text-sm font-black"><input type="radio" checked={form.commissionType === '全店統一'} onChange={()=>setForm({...form, commissionType:'全店統一'})}/> <span>全店統一</span></label>
                                            <label className="flex items-center space-x-2 text-sm font-black"><input type="radio" checked={form.commissionType === '個別設定'} onChange={()=>setForm({...form, commissionType:'個別設定'})}/> <span>個別設定</span></label>
                                        </div>
                                        {form.commissionType === '個別設定' && <input type="number" placeholder="輸入個人抽成比例 %" className="input-ios" value={form.commissionValue} onChange={e=>setForm({...form, commissionValue:e.target.value})}/>}
                                    </div>

                                    <div className="flex items-center gap-6">
                                        <div className="flex flex-col items-center"><label className="text-[10px] font-black text-gray-400 mb-1">顏色</label><input type="color" className="w-12 h-10 bg-transparent cursor-pointer rounded-lg border-none" value={form.color} onChange={e=>setForm({...form, color:e.target.value})}/></div>
                                        <div className="flex-1"><label className="text-[10px] font-black text-gray-400 ml-2">備忘錄</label><input className="input-ios" placeholder="輸入紀錄事項..." value={form.note} onChange={e=>setForm({...form, note:e.target.value})}/></div>
                                    </div>

                                    <div className="flex gap-4 pt-6 border-t border-gray-200">
                                        <button onClick={() => {setShowAddModal(false); setEditingStaff(null);}} className="flex-1 py-4 font-black text-gray-400">取消</button>
                                        <button onClick={handleSaveStaff} className="flex-1 py-4 btn-glass-white text-[#D4AF37] shadow-xl active:scale-95 transition-all">確認存檔</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HairSalonApp />);
    </script>
</body>
</html>
