    <style>
        :root { 
            --primary: #1C1C1E; 
            --accent: #D4AF37; 
            --bg-ios: #F2F2F7; 
            --glass-bg: rgba(255, 255, 255, 0.45); 
            --glass-blur: blur(35px) saturate(210%); 
        }
        body { font-family: -apple-system, 'Noto Sans TC', sans-serif; background: var(--bg-ios); margin: 0; overflow: hidden; -webkit-user-select: none; user-select: none; }
        *::-webkit-scrollbar { display: none !important; }

        /* --- 旗艦全景 UI 引擎 --- */
        .liquid-glass { position: relative; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 0.5px solid rgba(255, 255, 255, 0.7); border-top: 1.5px solid rgba(255, 255, 255, 0.9); border-radius: 2.5rem; box-shadow: 0 12px 45px rgba(0,0,0,0.04); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .glass-indicator { position: absolute; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border-radius: 1.25rem; transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.2); z-index: 0; pointer-events: none; }
        .crystal-menu { position: absolute; top: 110%; left: 0; right: 0; z-index: 9999; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(50px) saturate(250%); border: 1.5px solid rgba(255, 255, 255, 0.9); border-radius: 1.8rem; box-shadow: 0 25px 50px rgba(0,0,0,0.12); padding: 0.6rem; animation: crystalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes crystalIn { from { opacity: 0; transform: translateY(-12px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .crystal-option { padding: 0.9rem 1.3rem; border-radius: 1.1rem; font-weight: 800; font-size: 14px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; cursor: pointer; color: #1C1C1E; }
        .crystal-option:hover { background: rgba(212, 175, 55, 0.1); color: #D4AF37; }
        .crystal-option.selected { background: #D4AF37; color: white; }
        .input-ios { width: 100%; background: rgba(255, 255, 255, 0.8); border: 1px solid #E5E5EA; border-radius: 1.25rem; padding: 0.8rem 1.25rem; outline: none; font-size: 15px; font-weight: 700; transition: 0.3s; }
        .input-ios:focus { background: white; border-color: #D4AF37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .text-gold-gradient { background: linear-gradient(135deg, #b8860b, #D4AF37, #fdf5e6, #D4AF37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .pill-toggle { padding: 8px 18px; border-radius: 1rem; font-size: 12px; font-weight: 900; background: rgba(255, 255, 255, 0.5); border: 1px solid white; color: #8E8E93; transition: all 0.3s; }
        .pill-toggle.active { background: white; color: #D4AF37; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .receipt-container { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(40px) saturate(210%); border-radius: 2.5rem; border: 1.5px solid white; box-shadow: 0 40px 100px rgba(0,0,0,0.1); }
        .animate-fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* S3 專屬 */
        .nav-container { background: rgba(255, 255, 255, 0.6); padding: 6px; border-radius: 2rem; border: 1.5px solid white; display: flex; position: relative; z-index: 50; }
        .pearl-slider { position: absolute; top: 6px; bottom: 6px; background: rgba(245, 240, 225, 0.98); border-radius: 1.5rem; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid rgba(212, 175, 55, 0.2); }
        .nav-item { position: relative; z-index: 20; padding: 12px 24px; font-size: 15px; font-weight: 900; cursor: pointer; text-align: center; color: #8E8E93; transition: 0.3s; }
        .nav-item.active { color: #1C1C1E; }

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

// ======================================================
// ⚡️ 數位收據攔截引擎：掃描後顯示白紙黑字模式
// ======================================================
(function() {
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('receipt')) {
        const itemsRaw = urlParams.get('items');
        const total = urlParams.get('total');
        // 解碼資料
        const items = itemsRaw.split('|').map(str => str.split(':'));

        // 渲染極簡白紙收據介面
        document.write(`
            <div style="background: white; min-height: 100vh; padding: 40px; font-family: -apple-system, sans-serif; color: black; display: flex; justify-content: center;">
                <div style="width: 100%; max-width: 350px;">
                    <div style="text-align: center; margin-bottom: 40px;">
                        <h1 style="font-size: 28px; font-weight: 900; letter-spacing: 4px; margin-bottom: 5px;">EXCLUSIVE SPACE</h1>
                        <p style="font-size: 10px; color: #888; letter-spacing: 2px;">DIGITAL RECEIPT</p>
                    </div>
                    
                    <div style="border-top: 1.5px solid #000; border-bottom: 1.5px solid #000; padding: 25px 0; margin-bottom: 25px;">
                        ${items.map(item => `
                            <div style="display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 16px; font-weight: 600;">
                                <span>${item[0]}</span>
                                <span>$${item[1]}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div style="display: flex; justify-content: space-between; font-weight: 900; font-size: 24px; margin-bottom: 50px;">
                        <span>TOTAL</span>
                        <span>$${total}</span>
                    </div>

                    <div style="text-align: center; border-top: 1px dashed #eee; pt-20">
                        <p style="margin-top: 30px; font-size: 12px; font-weight: bold; color: #333;">感謝您的光臨</p>
                        <p style="font-size: 9px; color: #aaa; margin-top: 10px;">${new Date().toLocaleString()}</p>
                        <button onclick="window.location.href=window.location.pathname" style="margin-top: 40px; padding: 10px 20px; background: #f5f5f7; border: none; border-radius: 10px; font-size: 11px; color: #888; cursor: pointer;">返回系統</button>
                    </div>
                </div>
            </div>
        `);
        window.stop(); // 停止後續 React 加載
    }
})();

        const Icon = ({ name, size = 18, color = "currentColor", className = "" }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, stroke: color, strokeWidth: '2.5px' }}></i>;
        };
// ======================================================
// --- S1: 開單模組 (修復結帳後數據消失 + QR碼顯示邏輯) ---
// ======================================================
const S1_OrderModule = ({ onCheckout, staffList, services, products, setActiveTab, onAddCustomer, customers }) => {    const [orderDate, setOrderDate] = useState(new Date().toISOString().split('T')[0]);
    const [gender, setGender] = useState('女生');
    const [category, setCategory] = useState('全部');
    const [orderItems, setOrderItems] = useState([]);
    const [editingItem, setEditingItem] = useState(null); 
    const [customerType, setCustomerType] = useState('散客');
    const [searchQuery, setSearchQuery] = useState('');
    const [payMethod, setPayMethod] = useState('現金');
    const [cashIn, setCashIn] = useState('');
    const [selectedStaff, setSelectedStaff] = useState(staffList[0] || '小刀');
    // ⚡️ 補回：收據與處理狀態定義 (這是剛才漏掉的)
    const [showReceipt, setShowReceipt] = useState(false);
    const [receiptData, setReceiptData] = useState(null); 
    const [showConfirmModal, setShowConfirmModal] = useState(false);
    const [isProcessing, setIsProcessing] = useState(false);
    const qrRef = useRef(null); // QR 碼的畫筆
    const [isStaffOpen, setIsStaffOpen] = useState(false);
    // ⚡️ 補回：計算抽成的邏輯
    const calculateCommission = (item) => {
        const price = Number(item.finalPrice) || 0;
        const cost = Number(item.cost) || 0;
        const commA = Number(item.commA) || 0; // 服務項目的抽成比 (師A)
        const commValue = Number(item.comm) || 0; // 產品販賣的抽成比
        
        // ⚡️ 核心毛利邏輯：不論服務還是產品，通通先扣除成本
        const profit = price - cost;

        // 如果是「服務項目」(洗、剪、燙、染、護)
        if (item.cat !== '販賣') {
            // 如果毛利小於等於0，沒錢賺就不計抽成；否則按 (毛利 * 比例) 計算
            if (profit <= 0) return 0;
            // 這裡會自動判斷是 % 還是 $
            return item.mode === 'percent' ? Math.round(profit * commA / 100) : commA;
        } 
        
        // 如果是「產品販賣」
        // ⚡️ 邏輯：(售價 - 成本) * 產品抽成比
        return profit > 0 ? Math.round(profit * commValue / 100) : 0;
    };
    

    const addItem = (s) => setOrderItems(prev => [...prev, { 
        ...s, orderId: Date.now() + Math.random(), finalPrice: s.price, originalPrice: s.price, assistant: '無' 
    }]);

    const totalAmount = orderItems.reduce((s, i) => s + Number(i.finalPrice), 0);
    const change = cashIn ? Math.max(0, parseInt(cashIn) - totalAmount) : 0;

   // ⚡️ 終極加固：QR 碼繪製引擎 (支援掃描與點擊開跳轉)
    useEffect(() => {
        let timer;
        if (showReceipt && receiptData && qrRef.current) {
            timer = setTimeout(() => {
                const container = qrRef.current;
                container.innerHTML = ""; // 清空舊內容

                // 1. 準備明細資料，封裝成網址參數
                const baseUrl = window.location.href.split('?')[0];
                const itemsData = receiptData.items.map(i => `${i.name}:${i.finalPrice}`).join('|');
                const qrUrl = `${baseUrl}?receipt=1&items=${encodeURIComponent(itemsData)}&total=${receiptData.total}`;

                // 2. 使用 QRCode 套件繪製 (掃這個網址就不會跳 Google 搜尋了)
                if (window.QRCode) {
                    new QRCode(container, {
                        text: qrUrl,
                        width: 180,
                        height: 180,
                        colorDark: "#1C1C1E",
                        colorLight: "#ffffff",
                        correctLevel: QRCode.CorrectLevel.M
                    });
                    console.log("✅ 數位收據 QR 碼已生成");
                }
            }, 800);
        }
        return () => clearTimeout(timer);
    }, [showReceipt, receiptData]);
    const executeCheckout = async () => {
        if (isProcessing || orderItems.length === 0) return;
        setIsProcessing(true);

        // 1. 先把目前的數據備份到 Receipt 專用區
        const dataToSave = {
            items: [...orderItems],
            total: totalAmount,
            customer: searchQuery || "一般散客"
        };
        setReceiptData(dataToSave);

        // 2. 結帳記錄
        const record = { 
            id: `REC-${Date.now()}`, 
            date: orderDate,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            customer: dataToSave.customer, 
            staff: selectedStaff, 
            total: dataToSave.total, 
            services: dataToSave.items.map(i => i.name), 
            payment: payMethod,
            commission: dataToSave.items.reduce((sum, item) => sum + calculateCommission(item), 0)
        };

        await onCheckout(record);
        
        // 3. 切換視窗，此時不清除 orderItems
        setIsProcessing(false); 
        setShowConfirmModal(false); 
        setShowReceipt(true); 
    };

    // ⚡️ 核心修復：關閉工單時才清空數據
    const handleCloseReceipt = () => {
        setShowReceipt(false);
        setOrderItems([]);
        setSearchQuery('');
        setCashIn('');
        setReceiptData(null);
    };

    const applyQuickDiscount = (type, value) => {
        if (!editingItem || !value) return;
        let newPrice = editingItem.originalPrice;
        const v = Number(value);
        if (type === 'minus') newPrice = Math.max(0, editingItem.originalPrice - v);
        if (type === 'percent') newPrice = Math.round(editingItem.originalPrice * (v / 10));
        
        const updated = { ...editingItem, finalPrice: newPrice };
        setEditingItem(updated);
        setOrderItems(prev => prev.map(i => i.orderId === editingItem.orderId ? updated : i));
    };

    return (
        <div className="flex flex-col gap-4 animate-fade-in relative pb-10">
            <div className="flex justify-between items-end mb-1 px-2">
                <h1 className="text-5xl font-black text-gold-gradient tracking-tighter italic">開單結帳</h1>
                <input type="date" className="btn-glass-white px-4 py-2 text-sm outline-none" value={orderDate} onChange={e => setOrderDate(e.target.value)} />
            </div>

            <div className="flex flex-col md:flex-row gap-6">
                {/* 左側面板 */}
                <div className="flex-[1.2] liquid-glass p-6 md:p-8 flex flex-col">
                    <div className="flex flex-wrap gap-2 mb-4">
                        {['男生', '女生', '小孩', '長輩', '其他'].map(t => (<button key={t} onClick={() => setGender(t)} className={`pill-toggle ${gender === t ? 'active' : ''}`}>{t}</button>))}
                    </div>
                    <div className="flex gap-2 mb-6 pb-2 border-b border-white/30 overflow-x-auto no-scrollbar">
                        {['全部', '洗髮', '剪髮', '燙髮', '染髮', '護理', '販賣'].map(c => (<button key={c} onClick={() => setCategory(c)} className={`pill-toggle whitespace-nowrap ${category === c ? 'active' : ''}`}>{c}</button>))}
                    </div>
                    <div className="grid grid-cols-2 lg:grid-cols-3 gap-4 overflow-y-auto max-h-[500px] no-scrollbar">
                            {services.concat(products || []).filter(s => category === '全部' || s.cat === category).map(s => (                            <button key={s.id} onClick={() => addItem(s)} className="service-card liquid-glass p-6 bg-white/40 hover:bg-white/80 active:scale-95 transition-all text-left">
                                <span className="text-[9px] font-black text-gray-400 block mb-1 uppercase tracking-widest">{s.cat}</span>
                                <h3 className="text-lg font-black text-gray-800 truncate">{s.name}</h3>
                                <b className="text-[#D4AF37] text-xl font-black">${s.price}</b>
                            </button>
                        ))}
                    </div>
                </div>

                {/* 右側明細 */}
                <div className="flex-1 liquid-glass p-6 md:p-8 flex flex-col relative shadow-2xl">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-black italic tracking-tighter">結帳明細</h2>
                        <div className="flex bg-gray-200/40 p-1 rounded-xl">
                            {['散客', '會員'].map(t => (<button key={t} onClick={() => setCustomerType(t)} className={`px-5 py-2 rounded-lg text-xs font-black transition-all ${customerType === t ? 'bg-white shadow-sm text-black' : 'text-gray-400'}`}>{t}</button>))}
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4 mb-6 relative items-end">
                        <div className="space-y-1 relative">
                            <label className="text-[9px] font-black text-gray-400 ml-4">設計師</label>
                            <div onClick={() => setIsStaffOpen(!isStaffOpen)} className="input-ios cursor-pointer flex justify-between items-center bg-white/90 font-black text-sm">
                                {selectedStaff} <Icon name="chevron-down" size={16} color="#D4AF37" />
                            </div>
                            {isStaffOpen && <div className="crystal-menu shadow-2xl z-[100]">{staffList.map(s => (<div key={s} onClick={() => { setSelectedStaff(s); setIsStaffOpen(false); }} className="crystal-option"><span>{s}</span></div>))}</div>}
                        </div>
                        <div className="space-y-1 relative">
                            <label className="text-[9px] font-black text-gray-400 ml-4">{customerType}搜尋</label>
                            <input className="input-ios font-black text-sm" placeholder="名字或電話" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto space-y-3 mb-6 no-scrollbar pr-1">
                        {orderItems.map(item => (
                            <div key={item.orderId} className="flex justify-between items-center bg-white/50 p-5 rounded-[2.5rem] border border-white shadow-sm transition-all animate-fade-in">
                                <div className="flex-1 truncate pr-4">
                                    <div className="text-sm font-black text-gray-800 italic">{item.name}</div>
                                    <div className="text-[9px] text-gray-400 font-bold">助理: {item.assistant}</div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <b className="text-xl font-black text-[#D4AF37]">${item.finalPrice}</b>
                                    <div className="flex gap-2">
                                        <button onClick={() => setEditingItem(item)} className="w-9 h-9 bg-white rounded-full flex items-center justify-center text-gray-400 active:scale-90 shadow-md"><Icon name="edit-3" size={14}/></button>
                                        <button onClick={() => { if(window.confirm(`確定移除項目？`)) setOrderItems(orderItems.filter(i=>i.orderId!==item.orderId)) }} className="w-9 h-9 bg-white rounded-full flex items-center justify-center text-red-300 shadow-sm"><Icon name="trash-2" size={14}/></button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="pt-4 border-t border-white/50">
                        <div className="flex gap-2 mb-4 overflow-x-auto no-scrollbar">{['現金', 'LinePay', '街口', '信用卡'].map(p => (<button key={p} onClick={() => setPayMethod(p)} className={`px-5 py-2 rounded-xl text-[10px] font-black transition-all shrink-0 ${payMethod === p ? 'bg-black text-[#D4AF37] shadow-xl' : 'bg-white text-gray-400'}`}>{p}</button>))}</div>

                        {payMethod === '現金' && (
                            <div className="bg-white/80 p-5 rounded-[2.5rem] border border-white shadow-xl mb-6 space-y-4 animate-fade-in">
                                <div className="flex items-center gap-4">
                                    <span className="text-[10px] font-black text-green-600 w-16 shrink-0 italic">收現款項</span>
                                    <input className="input-ios text-xl font-black text-green-600 bg-white shadow-inner" type="number" value={cashIn} onChange={e => setCashIn(e.target.value)} placeholder="0" />
                                </div>
                                <div className="flex items-center gap-4">
                                    <span className="text-[10px] font-black text-red-400 w-16 shrink-0 italic">應找零錢</span>
                                    <div className="input-ios text-xl font-black text-red-400 bg-gray-50 flex items-center justify-center italic shadow-inner">${change}</div>
                                </div>
                            </div>
                        )}

                        <div className="flex justify-between items-end mb-6 px-4">
                            <span className="text-gray-400 font-black text-xs uppercase tracking-widest">Total</span>
                            <span className="text-6xl font-black text-gray-900 tracking-tighter italic">${totalAmount.toLocaleString()}</span>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => { if(orderItems.length > 0) setShowReceipt(true); else alert('請先點餐'); }} className="w-20 h-16 bg-white flex items-center justify-center text-[#D4AF37] shadow-xl border border-white rounded-[2rem] active:scale-95 shrink-0"><Icon name="qr-code" size={32}/></button>
                            <button onClick={() => { if(orderItems.length > 0) setShowConfirmModal(true); }} className="flex-1 py-6 bg-[#1C1C1E] text-[#D4AF37] rounded-[2.5rem] text-2xl font-black shadow-2xl active:scale-95 border border-white/10 uppercase italic">Check Out</button>
                        </div>
                    </div>
                </div>
            </div>

            {/* 修改與折扣彈窗 */}
            {editingItem && (
                <div className="fixed inset-0 bg-black/40 backdrop-blur-md z-[5000] flex items-center justify-center p-4">
                    <div className="liquid-glass w-full max-w-lg p-12 bg-[#F2F2F7] border-white shadow-2xl animate-pop">
                        <h3 className="text-2xl font-black text-gold-gradient mb-8 text-center italic uppercase tracking-widest">Adjustment: {editingItem.name}</h3>
                        <div className="space-y-6">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-1"><label className="text-[9px] font-black text-gray-400 ml-4 uppercase tracking-widest">最終售價</label><input className="input-ios text-xl font-black text-[#D4AF37]" type="number" value={editingItem.finalPrice} onChange={e => {
                                    const val = parseInt(e.target.value)||0;

// --- S8: 系統設定 (旗艦授權版：金鑰驗證 + 網址自動綁定 + 項目全同步) ---
// ==========================================================
const S8_SystemModule = ({ services, setServices }) => {
    const [activeMenu, setActiveMenu] = useState('標籤');
    const [itemTab, setItemTab] = useState('服務');
    
    // ⚡️ 核心：讀取本地授權配置
    const [fbConfig, setFbConfig] = useState(JSON.parse(localStorage.getItem('salon_fb_config')) || { apiKey: '', salonId: '', licenseKey: '' });
    const [syncStatus, setSyncStatus] = useState(fbConfig.licenseKey ? 'online' : 'offline');
    const [isActivating, setIsActivating] = useState(false);

    // ⚡️ 標籤狀態
    const [genders, setGenders] = useState(['男生', '女生', '小孩', '長輩']);
    const [classes, setClasses] = useState(['洗髮', '剪髮', '燙髮', '染髮', '護理', '販賣']);
    const [payments, setPayments] = useState(['現金', 'LinePay', '街口', '信用卡']);
    const [products, setProducts] = useState([]); 

    const [tagModal, setTagModal] = useState({ show: false, title: '', old: '', callback: null });
    const [itemModal, setItemModal] = useState({ show: false, data: null });
    const [itemForm, setItemForm] = useState({});
    const [tagInput, setTagInput] = useState('');
    const [openDropdown, setOpenDropdown] = useState(false);

    // 🛰 實時同步標籤：從雲端抓取該店專屬標籤
    useEffect(() => {
        const salonId = fbConfig.salonId || 'DEMO_STORE';
        const unsub = db.collection("Salons").doc(salonId).collection("Settings").doc("Tags")
            .onSnapshot(doc => {
                if (doc.exists) {
                    const data = doc.data();
                    if(data.genders) setGenders(data.genders);
                    if(data.classes) setClasses(data.classes);
                    if(data.payments) setPayments(data.payments);
                }
            });
        return () => unsub();
    }, [fbConfig.salonId]);

    // ☁️ 同步標籤到雲端
    const syncTagsToCloud = async (type, newList) => {
        const salonId = fbConfig.salonId || 'DEMO_STORE';
        try {
            await db.collection("Salons").doc(salonId).collection("Settings").doc("Tags").set({
                genders: type === '性別' ? newList : genders,
                classes: type === '類別' ? newList : classes,
                payments: type === '支付' ? newList : payments
            }, { merge: true });
        } catch (e) { console.error("標籤同步失敗", e); }
    };

    // ⚡️ 核心功能：激活系統並綁定專屬網址
    const handleActivateSystem = async () => {
        if (!fbConfig.salonId || !fbConfig.licenseKey) return alert("請輸入店號與金鑰！");
        setIsActivating(true);
        try {
            // 1. 去雲端票倉找這把鑰匙
            const keyRef = db.collection("AuthorizedKeys").doc(fbConfig.licenseKey);
            const doc = await keyRef.get();
            
            if (!doc.exists) {
                alert("❌ 授權金鑰不存在！請聯繫管理員購買。");
                setIsActivating(false);
                return;
            }

            const keyData = doc.data();
            // 2. 防盜檢查
            if (keyData.status === "used" && keyData.salonId !== fbConfig.salonId) {
                alert("❌ 此金鑰已被其他店號綁定！");
                setIsActivating(false);
                return;
            }

            // 3. 通過驗證：更新雲端狀態並初始化店鋪
            await keyRef.set({ 
                status: "used", 
                salonId: fbConfig.salonId, 
                activatedAt: firebase.firestore.FieldValue.serverTimestamp() 
            }, { merge: true });

            await db.collection("Salons").doc(fbConfig.salonId).set({ initialized: true }, { merge: true });
            
            // 4. 儲存設定到本地
            const finalConfig = { ...fbConfig, apiKey: "AIzaSyCMgz-UEFux6v1kcZhuvHaeSxhqxx-9zT4" };
            localStorage.setItem('salon_fb_config', JSON.stringify(finalConfig));
            
            // 💡 神奇功能：自動幫網址加上 ?id=店號 (方便以後免登入)
            const newUrl = `${window.location.origin}${window.location.pathname}?id=${fbConfig.salonId}`;
            window.history.replaceState(null, '', newUrl);

            alert(`🎉 授權成功！\n您的專屬網址已生成，建議「加入主螢幕」使用。`);
            window.location.reload();
        } catch (e) { 
            console.error(e);
            alert("連線驗證失敗，請檢查網路。"); 
        } finally { 
            setIsActivating(false); 
        }
    };

    // 🛠 標籤/項目編輯功能
    const openTag = (title, old, type, currentList, setter) => { 
        setTagInput(old || ''); 
        setTagModal({ 
            show: true, title, old, 
            callback: (val) => {
                if (!val.trim()) return;
                let newList = old ? currentList.map(i => i === old ? val : i) : [...currentList, val];
                setter(newList);
                syncTagsToCloud(type, newList);
                setTagModal({ show: false });
            }
        }); 
    };

    const handleDeleteItem = async (id, name) => {
        if (window.confirm(`確定刪除「${name}」？`)) {
            const salonId = fbConfig.salonId || 'DEMO_STORE';
            if (itemTab === '服務') {
                await db.collection("Salons").doc(salonId).collection("Services").doc(id).delete();
            } else {
                setProducts(products.filter(p => p.id !== id));
            }
        }
    };

    const openItem = (data = null) => {
        setItemForm(data || (itemTab === '服務' ? { name: '', cat: classes[0], price: '', cost: '', commA: '', commB: '', mode: 'percent' } : { name: '', price: '', cost: '', comm: '', mode: 'percent' }));
        setItemModal({ show: true, data });
    };

    const handleSaveItem = async () => {
        const salonId = fbConfig.salonId || 'DEMO_STORE';
        const dataToSave = {
            ...itemForm,
            id: itemModal.data ? itemModal.data.id : `ITEM-${Date.now()}`,
            price: Number(itemForm.price) || 0,
            cost: Number(itemForm.cost) || 0,
            commA: Number(itemForm.commA) || 0,
            commB: Number(itemForm.commB) || 0,
            comm: Number(itemForm.comm) || 0
        };
        if (itemTab === '服務') {
            await db.collection("Salons").doc(salonId).collection("Services").doc(dataToSave.id).set(dataToSave);
        } else {
            setProducts(prev => itemModal.data ? prev.map(p => p.id === dataToSave.id ? dataToSave : p) : [...prev, dataToSave]);
        }
        setItemModal({ show: false });
    };

    return (
        <div className="flex flex-col xl:flex-row h-full w-full gap-6 md:gap-10 bg-transparent overflow-hidden">
            {/* 左側選單 */}
            <div className="w-full xl:w-80 shrink-0 flex flex-col gap-4">
                <div className="hidden xl:block px-4 mb-8"><h1 className="text-6xl font-black text-gold-gradient tracking-tighter italic uppercase font-sans">Admin</h1></div>
                <div className="flex xl:flex-col gap-2 md:gap-4 overflow-x-auto no-scrollbar pb-2 xl:pb-0">
                    {[{id:'標籤', icon:'tag'}, {id:'項目', icon:'layers'}, {id:'雲端中心', icon:'cloud'}].map(m => (
                        <button key={m.id} onClick={()=>setActiveMenu(m.id)} 
                            className={`flex-1 min-w-[140px] xl:w-full py-5 px-6 rounded-3xl flex items-center justify-center xl:justify-start gap-4 transition-all border
                            ${activeMenu===m.id ? 'bg-[#1C1C1E] text-[#D4AF37] scale-105 shadow-2xl border-black' : 'bg-white/40 text-gray-400 border-white hover:bg-white/60'}`}>

// --- 第三部分：核心主程式 (旗艦版：全自動雲端路徑隔離引擎) ---

const HairSalonApp = () => {
    const [activeTab, setActiveTab] = useState('s1');
    const [records, setRecords] = useState([]);
    const [customers, setCustomers] = useState([]);
    const [serviceList, setServiceList] = useState([]);
    const [staffData, setStaffData] = useState([]);
    // ⚡️ 補回：庫存與支出狀態
    const [inventoryItems, setInventoryItems] = useState([]);
    const [expenses, setExpenses] = useState([]);

    // ⚡️ 核心：動態獲取當前店鋪 ID (對接 S8 設定)
    const getSalonId = () => {
        const config = JSON.parse(localStorage.getItem('salon_fb_config'));
        return config?.salonId || 'DEMO_STORE';
    };

    // 🛰 實時同步引擎：監聽雲端所有異動 (路徑皆由 salonId 隔離)
    useEffect(() => {
        const salonId = getSalonId();
        console.log(`🚀 雲端核心啟動：[${salonId}]`);

        // 1. 監聽帳單 (Records)
        const unsubRecords = db.collection("Salons").doc(salonId).collection("Records")
            .orderBy('date', 'desc').limit(100)
            .onSnapshot(snap => {
                setRecords(snap.docs.map(doc => ({ ...doc.data(), id: doc.id })));
            });

        // 2. 監聽顧客名單 (Customers)
        const unsubCustomers = db.collection("Salons").doc(salonId).collection("Customers")
            .onSnapshot(snap => {
                setCustomers(snap.docs.map(doc => ({ ...doc.data(), id: doc.id })));
            });

        // 3. 監聽服務項目 (Services)
        const unsubServices = db.collection("Salons").doc(salonId).collection("Services")
            .onSnapshot(snap => {
                const data = snap.docs.map(doc => ({ ...doc.data(), id: doc.id }));
                if(data.length > 0) setServiceList(data);
            });

        // 4. 監聽夥伴名單 (Staff)
        const unsubStaff = db.collection("Salons").doc(salonId).collection("Staff")
            .onSnapshot(snap => {
                const data = snap.docs.map(doc => ({ ...doc.data(), id: doc.id }));
                if(data.length > 0) {
                    setStaffData(data);
                } else {
                    // 若雲端沒人，預設管理員
                    const admin = { id: 'admin', name: '小刀', role: '管理員', color: '#D4AF37' };
                    setStaffData([admin]);
                }
            });

        // ⚡️ 補回 5：監聽庫存紀錄 (Inventory)
        const unsubInv = db.collection("Salons").doc(salonId).collection("Inventory")
            .onSnapshot(snap => {
                setInventoryItems(snap.docs.map(doc => ({ ...doc.data(), id: doc.id })));
            });

        // ⚡️ 補回 6：監聽支出明細 (Expenses)
        const unsubExp = db.collection("Salons").doc(salonId).collection("Expenses")
            .onSnapshot(snap => {
                setExpenses(snap.docs.map(doc => ({ ...doc.data(), id: doc.id })));
            });

        return () => { 
            unsubRecords(); unsubCustomers(); unsubServices(); 
            unsubStaff(); unsubInv(); unsubExp(); 
        };
    }, []);

    const staffList = useMemo(() => staffData.map(s => s.name), [staffData]);

    // ☁️ 雲端結帳 (含原子化顧客金額累計)
    const onCheckout = async (record) => {
        const salonId = getSalonId();
        await db.collection("Salons").doc(salonId).collection("Records").doc(record.id).set({
            ...record,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        // ⚡️ 會員消費金額自動累加
        const custRef = db.collection("Salons").doc(salonId).collection("Customers");
        const snapshot = await custRef.where("name", "==", record.customer).get();
        snapshot.forEach(doc => {
            doc.ref.update({ 
                totalSpend: firebase.firestore.FieldValue.increment(Number(record.total)),
                lastVisit: record.date
            });
        });
        console.log(`✅ 結帳完成: ${record.customer}`);
    };

    // ☁️ 雲端新增顧客
    const onAddCustomer = async (newCust) => {
        const salonId = getSalonId();
        const id = newCust.id || `CUST-${Date.now()}`;
        const selectedS = staffData.find(s => s.name === newCust.staff) || staffData[0];
        
        await db.collection("Salons").doc(salonId).collection("Customers").doc(id).set({
            phone: '', totalSpend: 0, history: [], color: selectedS.color,
            ...newCust, id, lastVisit: new Date().toISOString().split('T')[0]
        }, { merge: true });
    };

    // ☁️ 雲端夥伴更新 (S6)
    const onUpdateStaff = async (newStaff) => {
        const salonId = getSalonId();
        await db.collection("Salons").doc(salonId).collection("Staff").doc(newStaff.id).set(newStaff, { merge: true });
    };

    // ⚡️ 補回：庫存異動執行 (S5)
    const onUpdateInventory = async (item) => {
        const salonId = getSalonId();
        await db.collection("Salons").doc(salonId).collection("Inventory").doc(item.id).set(item, { merge: true });
    };

    // ⚡️ 補回：支出紀錄執行 (S7)
    const onAddExpense = async (exp) => {
        const salonId = getSalonId();

    };

        { id: 's5', name: '庫存', icon: 'package' }, { id: 's6', name: '人員', icon: 'user' },
        { id: 's7', name: '支出', icon: 'credit-card' }, { id: 's8', name: '系統', icon: 'settings' }
    ];

                <div className="p-6 md:p-10 h-20 md:h-32 flex items-center gap-6 text-[#D4AF37] font-black text-4xl italic tracking-tighter uppercase">S</div>
                <nav className="flex-1 flex md:flex-col p-3 md:p-6 space-y-0 md:space-y-6 overflow-x-auto md:overflow-x-hidden no-scrollbar">
                    {menuItems.map(item => (

                            <Icon name={item.icon} color={activeTab === item.id ? "#D4AF37" : "#8E8E93"} size={26}/>

                        {activeTab === 's4' && <S4_CustomerModule customers={customers} staffData={staffData} />}
                        {activeTab === 's5' && <S5_InventoryModule items={inventoryItems} onUpdateInventory={onUpdateInventory} />}
                        {activeTab === 's6' && <S6_StaffModule staffData={staffData} setStaffData={setStaffData} onUpdateStaff={onUpdateStaff} />}
                        {activeTab === 's7' && <S7_ExpenseModule expenses={expenses} onAddExpense={onAddExpense} />}
                        {activeTab === 's8' && <S8_SystemModule services={serviceList} setServices={setServiceList} />}
                    </div>
                </div>
            </main>
        </div>
    );
};

        ReactDOM.createRoot(document.getElementById('root')).render(<HairSalonApp />);
    </script>
</body>
</html>
