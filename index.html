<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Salon POS - 黑金旗艦 2,000行全整合版</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            --primary: #1C1C1E; 
            --accent: #D4AF37; 
            --bg-ios: #F2F2F7; 
            --glass-bg: rgba(255, 255, 255, 0.45); 
            --glass-blur: blur(35px) saturate(210%); 
        }
        body { font-family: -apple-system, 'Noto Sans TC', sans-serif; background: var(--bg-ios); margin: 0; overflow: hidden; -webkit-user-select: none; user-select: none; }
        *::-webkit-scrollbar { display: none !important; }

        /* --- 旗艦全景 UI 引擎 --- */
        .liquid-glass { position: relative; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 0.5px solid rgba(255, 255, 255, 0.7); border-top: 1.5px solid rgba(255, 255, 255, 0.9); border-radius: 2.5rem; box-shadow: 0 12px 45px rgba(0,0,0,0.04); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .glass-indicator { position: absolute; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border-radius: 1.25rem; transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.2); z-index: 0; pointer-events: none; }
        .crystal-menu { position: absolute; top: 110%; left: 0; right: 0; z-index: 9999; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(50px) saturate(250%); border: 1.5px solid rgba(255, 255, 255, 0.9); border-radius: 1.8rem; box-shadow: 0 25px 50px rgba(0,0,0,0.12); padding: 0.6rem; animation: crystalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes crystalIn { from { opacity: 0; transform: translateY(-12px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .crystal-option { padding: 0.9rem 1.3rem; border-radius: 1.1rem; font-weight: 800; font-size: 14px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; cursor: pointer; color: #1C1C1E; }
        .crystal-option:hover { background: rgba(212, 175, 55, 0.1); color: #D4AF37; }
        .crystal-option.selected { background: #D4AF37; color: white; }
        .input-ios { width: 100%; background: rgba(255, 255, 255, 0.8); border: 1px solid #E5E5EA; border-radius: 1.25rem; padding: 0.8rem 1.25rem; outline: none; font-size: 15px; font-weight: 700; transition: 0.3s; }
        .input-ios:focus { background: white; border-color: #D4AF37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .text-gold-gradient { background: linear-gradient(135deg, #b8860b, #D4AF37, #fdf5e6, #D4AF37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .pill-toggle { padding: 8px 18px; border-radius: 1rem; font-size: 12px; font-weight: 900; background: rgba(255, 255, 255, 0.5); border: 1px solid white; color: #8E8E93; transition: all 0.3s; }
        .pill-toggle.active { background: white; color: #D4AF37; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .receipt-container { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(40px) saturate(210%); border-radius: 2.5rem; border: 1.5px solid white; box-shadow: 0 40px 100px rgba(0,0,0,0.1); }
        .animate-fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* S3 專屬 */
        .nav-container { background: rgba(255, 255, 255, 0.6); padding: 6px; border-radius: 2rem; border: 1.5px solid white; display: flex; position: relative; z-index: 50; }
        .pearl-slider { position: absolute; top: 6px; bottom: 6px; background: rgba(245, 240, 225, 0.98); border-radius: 1.5rem; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid rgba(212, 175, 55, 0.2); }
        .nav-item { position: relative; z-index: 20; padding: 12px 24px; font-size: 15px; font-weight: 900; cursor: pointer; text-align: center; color: #8E8E93; transition: 0.3s; }
        .nav-item.active { color: #1C1C1E; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, size = 18, color = "currentColor", className = "" }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, stroke: color, strokeWidth: '2.5px' }}></i>;
        };
 // ======================================================
// --- S1: 開單模組 (靈魂回歸：實收找零、搜尋修復、二次確認) ---
// ======================================================
const S1_OrderModule = ({ onCheckout, staffList, services, setActiveTab, onAddCustomer, customers }) => {
    const [orderDate, setOrderDate] = useState(new Date().toISOString().split('T')[0]);
    const [gender, setGender] = useState('女生');
    const [category, setCategory] = useState('全部');
    const [orderItems, setOrderItems] = useState([]);
    const [editingItem, setEditingItem] = useState(null);
    const [customerType, setCustomerType] = useState('散客');
    const [searchQuery, setSearchQuery] = useState('');
    const [payMethod, setPayMethod] = useState('現金');
    const [cashIn, setCashIn] = useState(''); // 實收靈魂
    const [selectedStaff, setSelectedStaff] = useState(staffList[0]);
    const [isStaffOpen, setIsStaffOpen] = useState(false);
    const [showReceipt, setShowReceipt] = useState(false);
    
    const [showConfirmModal, setShowConfirmModal] = useState(false);
    const [isProcessing, setIsProcessing] = useState(false);

    // --- S1_OrderModule 內部的搜尋邏輯 ---
    const suggestions = useMemo(() => {
    // ⚡️ 增加保險絲：如果 customers 不存在或是空的，回傳空陣列，不報錯
    if (customerType !== '會員' || !searchQuery.trim() || !customers) return [];
    
    return customers.filter(c => 
        (c.name && c.name.includes(searchQuery)) || 
        (c.phone && c.phone.includes(searchQuery))
    );
}, [searchQuery, customerType, customers]);
    const addItem = (s) => setOrderItems(prev => [...prev, { ...s, orderId: Date.now(), finalPrice: s.price, assistant: '無' }]);
    
    // ⚡️ 補回：二次確認刪除
    const removeItem = (id, name) => {
        if (window.confirm(`【確認移除】確定要刪除「${name}」嗎？`)) {
            setOrderItems(prev => prev.filter(i => i.orderId !== id));
        }
    };

    const totalAmount = orderItems.reduce((s, i) => s + i.finalPrice, 0);
    const change = cashIn ? Math.max(0, parseInt(cashIn) - totalAmount) : 0;

    const executeCheckout = async () => {
        if (isProcessing) return;
        setIsProcessing(true);
        const record = {
            id: Date.now().toString(),
            date: orderDate,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            customer: searchQuery || "一般散客",
            gender, staff: selectedStaff, total: totalAmount,
            services: orderItems.map(i => i.name),
            payment: payMethod
        };
        await onCheckout(record);
        setTimeout(() => {
            setIsProcessing(false);
            setShowConfirmModal(false);
            setShowReceipt(true);
            setOrderItems([]);
            setCashIn('');
            setSearchQuery('');
        }, 500);
    };

    return (
        <div className="h-full flex flex-col gap-6 animate-fade-in relative">
            {/* Header */}
            <div className="flex justify-between items-end mb-1">
                <div>
                    <h1 className="text-5xl font-black text-gold-gradient tracking-tighter italic">s1 開單結帳</h1>
                    <p className="text-gray-400 font-bold text-[10px] uppercase tracking-widest ml-1">Precision System</p>
                </div>
                <input type="date" className="input-ios w-40 text-xs font-black bg-white/60 border-white shadow-sm" value={orderDate} onChange={e => setOrderDate(e.target.value)} />
            </div>

            <div className="flex-1 flex flex-col md:flex-row gap-6 min-h-0">
                {/* 左側項目選擇 */}
                <div className="flex-[1.2] liquid-glass p-8 flex flex-col h-full overflow-hidden bg-white/20">
                    <div className="flex gap-2 mb-6 border-b border-white/30 overflow-x-auto pb-2">
                        {['全部', '洗髮', '剪髮', '燙髮', '染髮', '護理', '販賣'].map(c => (
                            <button key={c} onClick={() => setCategory(c)} className={`pill-toggle whitespace-nowrap ${category === c ? 'active' : ''}`}>{c}</button>
                        ))}
                    </div>
                    <div className="grid grid-cols-2 gap-4 overflow-y-auto pr-1">
                        {services.filter(s => category === '全部' || s.cat === category).map(s => (
                            <button key={s.id} onClick={() => addItem(s)} className="service-card liquid-glass p-6 bg-white/40 hover:bg-white/80 text-left transition-all">
                                <span className="text-[10px] font-black text-gray-400 uppercase italic opacity-60">{s.cat}</span>
                                <h3 className="text-xl font-black text-[#1C1C1E]">{s.name}</h3>
                                <b className="text-[#D4AF37] font-black">${s.price}</b>
                            </button>
                        ))}
                    </div>
                </div>

                {/* 右側結帳清單 */}
                <div className="flex-1 liquid-glass p-8 flex flex-col h-full bg-white/30 relative shadow-2xl">
                    <div className="flex justify-between items-center mb-5">
                        <h2 className="text-2xl font-black italic tracking-tighter">結帳明細</h2>
                        <div className="flex bg-gray-200/40 p-1 rounded-xl shadow-inner">
                            {['散客', '會員'].map(t => (
                                <button key={t} onClick={() => { setCustomerType(t); setSearchQuery(''); }} className={`px-4 py-1.5 rounded-lg text-xs font-black transition-all ${customerType === t ? 'bg-white shadow-sm text-black' : 'text-gray-400'}`}>{t}</button>
                            ))}
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4 mb-5 items-end">
                        <div className="space-y-1 relative">
                            <label className="text-[9px] font-black text-gray-400 ml-4">設計師</label>
                            <div onClick={() => setIsStaffOpen(!isStaffOpen)} className="input-ios cursor-pointer flex justify-between items-center bg-white shadow-sm border-white font-black">
                                <span>{selectedStaff}</span><Icon name="chevron-down" size={16} color="#D4AF37" />
                            </div>
                            {isStaffOpen && (
                                <div className="crystal-menu shadow-2xl border-white">
                                    {staffList.map(s => (<div key={s} onClick={() => { setSelectedStaff(s); setIsStaffOpen(false); }} className="crystal-option">{s}</div>))}
                                </div>
                            )}
                        </div>

                        <div className="space-y-1 relative">
                            <label className="text-[9px] font-black text-gray-400 ml-4">{customerType}搜尋</label>
                            <div className="flex gap-2">
                                <input className="input-ios font-black border-white shadow-sm" placeholder="名字..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                {customerType === '會員' && searchQuery && (
                                    <button onClick={() => { onAddCustomer({name: searchQuery}); setActiveTab('s4'); }} className="bg-green-500 text-white w-12 rounded-xl shadow-lg flex items-center justify-center active:scale-90 transition-all border border-white/20">
                                        <Icon name="check" size={20}/>
                                    </button>
                                )}
                            </div>
                            {suggestions.length > 0 && (
                                <div className="absolute top-full left-0 right-0 z-[100] bg-white/95 backdrop-blur-xl mt-1 p-2 rounded-2xl shadow-2xl border border-white">
                                    {suggestions.map(c => (
                                        <div key={c.id} onClick={() => setSearchQuery(c.name)} className="p-3 hover:bg-gold/10 rounded-xl cursor-pointer flex justify-between items-center transition-all">
                                            <b className="text-gray-800 text-sm">{c.name}</b>
                                            <span className="text-[10px] text-gray-400 font-black">{c.phone}</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto space-y-3 mb-5 pr-1">
                        {orderItems.map(item => (
                            <div key={item.orderId} className="flex justify-between items-center bg-white/60 p-5 rounded-[2.5rem] border border-white shadow-sm">
                                <div className="flex-1" onClick={() => setEditingItem(item)}>
                                    <div className="text-md font-black text-gray-800 italic">{item.name}</div>
                                </div>
                                <div className="flex items-center gap-3">
                                    <b className="text-xl font-black text-[#D4AF37]">${item.finalPrice}</b>
                                    <div className="flex gap-2">
                                        <button onClick={() => setEditingItem(item)} className="w-9 h-9 bg-white rounded-full flex items-center justify-center text-gray-400 hover:text-blue-500 shadow-sm border border-white"><Icon name="edit-3" size={14}/></button>
                                        <button onClick={() => removeItem(item.orderId, item.name)} className="w-9 h-9 bg-white rounded-full flex items-center justify-center text-red-300 hover:text-red-500 shadow-sm border border-white"><Icon name="trash-2" size={14}/></button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="pt-4 border-t border-white/50">
                        {/* ⚡️ 靈魂回歸：支付方式選擇 */}
                        <div className="flex gap-2 mb-4 overflow-x-auto no-scrollbar">
                            {['現金', 'LinePay', '街口', '信用卡'].map(p => (
                                <button key={p} onClick={() => setPayMethod(p)} className={`px-4 py-2 rounded-xl text-[10px] font-black transition-all border shadow-sm ${payMethod === p ? 'bg-black text-[#D4AF37] border-black' : 'bg-white text-gray-400 border-white'}`}>{p}</button>
                            ))}
                        </div>

                        {/* ⚡️ 靈魂回歸：收銀找零區 */}
                        {payMethod === '現金' && (
                            <div className="grid grid-cols-2 gap-4 mb-5 animate-fade-in">
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-gray-400 ml-4 italic">Received</label>
                                    <input className="input-ios text-xl font-black text-green-600 border-white shadow-inner bg-white/80" type="number" value={cashIn} onChange={e => setCashIn(e.target.value)} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-gray-400 ml-4 italic">Change</label>
                                    <div className="input-ios text-xl font-black text-red-500 border-white flex items-center shadow-inner bg-white/80">${change}</div>
                                </div>
                            </div>
                        )}

                        <div className="flex justify-between items-end mb-6 px-4">
                            <span className="text-gray-400 font-black text-xs uppercase italic tracking-widest">Grand Total</span>
                            <span className="text-6xl font-black text-gold-gradient tracking-tighter italic">${totalAmount}</span>
                        </div>

                        <div className="flex gap-3">
                            <button onClick={() => setShowReceipt(true)} className="w-20 h-20 btn-glass-white flex items-center justify-center text-[#D4AF37] shadow-xl border-white"><Icon name="qr-code" size={32}/></button>
                            <button onClick={() => { if(orderItems.length > 0) setShowConfirmModal(true); }} className="flex-1 py-6 bg-[#1C1C1E] text-[#D4AF37] rounded-[2.5rem] text-2xl font-black shadow-2xl active:scale-95 transition-all italic uppercase tracking-widest border border-white/10">Confirm & Save</button>
                        </div>
                    </div>
                </div>
            </div>

            {/* ⚡️ 二次確認 Modal */}
            {showConfirmModal && (
                <div className="fixed inset-0 bg-black/70 backdrop-blur-md z-[8000] flex items-center justify-center p-6">
                    <div className="liquid-glass w-full max-w-md p-12 bg-white animate-pop border-white text-center shadow-2xl">
                        <div className="w-20 h-20 bg-gold/10 rounded-full flex items-center justify-center mx-auto mb-6">
                            <Icon name="help-circle" size={48} color="#D4AF37"/>
                        </div>
                        <h3 className="text-3xl font-black text-gray-800 mb-2">確認結帳？</h3>
                        <p className="text-gray-400 font-bold mb-10 italic">顧客：{searchQuery || "一般散客"} | 金額：${totalAmount}</p>
                        <div className="flex gap-4">
                            <button onClick={() => setShowConfirmModal(false)} className="flex-1 py-5 font-black text-gray-400 uppercase italic">Cancel</button>
                            <button onClick={executeCheckout} disabled={isProcessing} className="flex-[2] py-5 bg-[#1C1C1E] text-[#D4AF37] rounded-2xl text-xl font-black shadow-xl uppercase italic">Yes, Checkout</button>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};
        // ======================================================
        // --- S2: 查單模組 (鵝卵石珍珠與二次確認) ---
        // ======================================================
        const S2_RecordTrackerModule = ({ records, onUpdateRecords, staffList }) => {
            const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
            const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);
            const [editingRec, setEditingRec] = useState(null);

            const handleDeleteRec = (id, name) => {
                if(window.confirm(`【二次確認】確定永久刪除「${name}」這筆單據嗎？`)) {
                    onUpdateRecords(records.filter(r => r.id !== id));
                }
            };

            const handleSaveEdit = () => {
                onUpdateRecords(records.map(r => r.id === editingRec.id ? editingRec : r));
                setEditingRec(null);
            };

            return (
                <div className="h-full flex flex-col gap-6 animate-fade-in relative">
                    <div className="flex flex-col md:flex-row justify-between items-end gap-6 shrink-0">
                        <div className="space-y-1">
                            <h1 className="text-5xl font-black text-gold-gradient tracking-tighter italic">s2 查單對帳</h1>
                            <p className="text-gray-400 font-bold text-[10px] uppercase tracking-widest ml-1 opacity-60">Real-time Revenue Audit</p>
                        </div>
                        <div className="flex items-center gap-4 bg-white/40 p-4 rounded-[2rem] border border-white shadow-sm">
                            <Icon name="calendar" size={16} color="#D4AF37" />
                            <input type="date" className="bg-transparent font-black text-sm outline-none" value={startDate} onChange={e=>setStartDate(e.target.value)} />
                            <span className="text-gray-300 font-black">~</span>
                            <input type="date" className="bg-transparent font-black text-sm outline-none" value={endDate} onChange={e=>setEndDate(e.target.value)} />
                        </div>
                    </div>

                    <div className="flex-1 liquid-glass p-10 flex flex-col min-h-0 bg-white/20">
                        <div className="flex justify-between items-end mb-10 border-b border-white/50 pb-10 shrink-0">
                            <h2 className="text-3xl font-black text-gray-800 tracking-tight italic">日結明細</h2>
                            <div className="text-right">
                                <span className="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-1">Period Total</span>
                                <span className="text-6xl font-black text-gold-gradient tracking-tighter">${records.reduce((s,r)=>s+r.total, 0).toLocaleString()}</span>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto space-y-6 pr-2">
                            {records.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-gray-300 italic opacity-50">
                                    <Icon name="inbox" size={60} className="mb-4" />
                                    <p className="font-black text-xl">目前尚無成交單據</p>
                                </div>
                            ) : records.map(r => (
                                <div key={r.id} className="bg-white/45 border border-white rounded-[3.5rem] p-10 flex flex-col md:flex-row justify-between items-center gap-8 transition-all hover:bg-white/90 shadow-sm group">
                                    <div className="flex items-center gap-10 flex-1 w-full">
                                        <div className="text-center opacity-30 border-r border-white/50 pr-8 hidden md:block min-w-[90px]">
                                            <div className="text-xs font-black uppercase tracking-tighter mb-1">{r.date.split('-')[2]} DAY</div>
                                            <div className="text-3xl font-bold">{r.time}</div>
                                        </div>
                                        <div className="flex-1">
                                            <div className="flex items-center gap-5 mb-4">
                                                <h3 className="text-4xl font-black text-[#1C1C1E] tracking-tight">{r.customer}</h3>
                                                <span className="px-5 py-1.5 bg-[#1C1C1E] rounded-full text-[10px] font-black text-[#D4AF37] uppercase shadow-lg">{r.staff}</span>
                                            </div>
                                            <div className="flex flex-wrap gap-2">
                                                {r.services.map((s, idx) => <span key={idx} className="bg-white px-5 py-2 rounded-2xl font-black shadow-sm border border-white text-xs text-gray-600">{s}</span>)}
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-10 w-full md:w-auto justify-between border-t md:border-none pt-6 md:pt-0">
                                        <div className="text-right">
                                            <span className="text-[10px] font-black text-gray-300 uppercase block mb-1">{r.payment}</span>
                                            <b className="text-5xl font-black text-gray-900 tracking-tighter">${r.total.toLocaleString()}</b>
                                        </div>
                                        <div className="flex gap-4">
                                            <button onClick={()=>setEditingRec(r)} className="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-lg hover:text-[#D4AF37] transition-all"><Icon name="edit-3" size={24}/></button>
                                            <button onClick={()=>handleDeleteRec(r.id, r.customer)} className="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-lg text-red-400 active:scale-90 transition-all"><Icon name="trash-2" size={24}/></button>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* S2: 編輯彈窗 */}
                    {editingRec && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-md z-[2000] flex items-center justify-center p-4">
                            <div className="liquid-glass w-full max-w-2xl p-14 bg-[#F2F2F7] animate-pop max-h-[90vh] overflow-y-auto">
                                <h3 className="text-3xl font-black text-gold-gradient mb-12 text-center italic tracking-tighter">Update Order Data</h3>
                                <div className="space-y-10">
                                    <div className="grid grid-cols-2 gap-8 items-end">
                                        <div className="space-y-2">

                <div onClick={()=>setActiveMenu('標籤')} className={`sidebar-item ${activeMenu==='標籤'?'active':''}`}><Icon name="tag"/> 標籤管理</div>
                <div onClick={()=>setActiveMenu('項目')} className={`sidebar-item ${activeMenu==='項目'?'active':''}`}><Icon name="layers"/> 項目清單</div>
                <div onClick={()=>setActiveMenu('備份導入')} className={`sidebar-item ${activeMenu==='備份導入'?'active':''}`}><Icon name="cloud"/> 備份同步</div>
                <div className="mt-auto pt-6 border-t border-white/40 text-[10px] font-black text-gray-300 text-center uppercase italic">Salon Pro Config</div>
            </div>

            {/* 右側：主內容區 */}
            <div className="flex-1 liquid-glass p-16 overflow-y-auto bg-white/45 border-white shadow-2xl">
                {activeMenu === '標籤' && (

                        {[['性別', genders, setGenders], ['類別歸屬', classes, setClasses], ['結帳方式', payments, setPayments]].map(([title, list, setList]) => (
                            <div key={title} className="tag-card space-y-8">
                                <div className="flex justify-between items-center px-2">

                                    <button onClick={()=>openTag(`制定${title}`, '', (v)=>setList([...list, v]))} className="btn-plus"><Icon name="plus" size={24}/></button>
                                </div>
                                <div className="flex flex-wrap gap-5 px-2">
                                    {list.map(t => (
                                        <div key={t} className="pill-item group shadow-sm bg-white/60 p-4 rounded-2xl flex items-center gap-6 border border-white">
                                            <span className="font-black">{t}</span>
                                            <div className="flex gap-4 opacity-0 group-hover:opacity-100 transition-all">
                                                <button onClick={()=>openTag(`修改${title}`, t, (v)=>setList(list.map(i=>i===t?v:i)))} className="text-blue-400 hover:scale-125"><Icon name="edit-3" size={16}/></button>
                                                <button onClick={()=>{if(window.confirm('確定刪除？')) setList(list.filter(i=>i!==t))}} className="text-red-300 hover:scale-125"><Icon name="trash-2" size={16}/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </div>
                )}

                {activeMenu === '項目' && (
                    <div className="space-y-10 animate-pop">
                        <div className="flex justify-between items-center border-b border-white pb-10">
                            <div className="flex bg-white/50 p-2 rounded-2xl border border-white shadow-inner">
                                <button onClick={()=>setItemTab('服務')} className={`px-12 py-3 rounded-[1.2rem] font-black transition-all ${itemTab==='服務'?'bg-black text-[#D4AF37] shadow-xl':'text-gray-400'}`}>服務項目</button>
                                <button onClick={()=>setItemTab('商品')} className={`px-12 py-3 rounded-[1.2rem] font-black transition-all ${itemTab==='商品'?'bg-black text-[#D4AF37] shadow-xl':'text-gray-400'}`}>產品販賣</button>
                            </div>
                            <button onClick={()=>openItem()} className="btn-plus shadow-xl scale-125"><Icon name="plus" size={24}/></button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10 mt-12">
                            {(itemTab === '服務' ? services : products).map(item => (
                                <div key={item.id} className="tag-card group relative hover:bg-white transition-all border border-white p-10 rounded-[3rem] bg-white/50 shadow-sm">
                                    <div className="flex justify-between items-start mb-6 px-2">
                                        <div><span className="text-[10px] font-black bg-[#D4AF37] text-white px-3 py-1 rounded-full uppercase mb-2 inline-block tracking-widest italic">{itemTab}</span><h4 className="text-3xl font-black text-gray-800 italic">{item.name}</h4></div>
                                        <b className="text-5xl font-black text-gray-900 tracking-tighter italic">${item.price}</b>
                                    </div>
                                    <div className="flex gap-10 pt-6 border-t border-white text-xs font-black text-gray-400 italic px-2">
                                        <div>成本: ${item.cost}</div>
                                        {itemTab === '服務' ? (
                                            <><div className="text-blue-500">師抽(A): {item.commA}{item.mode==='percent'?'%':'$'}</div><div className="text-green-500">助抽(B): {item.commB}{item.mode==='percent'?'%':'$'}</div></>
                                        ) : (
                                            <div className="text-orange-500">抽成比例: {item.comm}%</div>
                                        )}
                                    </div>
                                    <div className="absolute top-8 right-8 flex gap-4 opacity-0 group-hover:opacity-100 transition-all">
                                        <button onClick={()=>openItem(item)} className="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-lg text-blue-500 hover:scale-110 transition-all"><Icon name="edit-3" size={20}/></button>
                                        <button onClick={()=>handleDeleteItem(item.id, item.name)} className="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-lg text-red-400 hover:scale-110 transition-all"><Icon name="trash-2" size={20}/></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {activeMenu === '備份導入' && (
                    <div className="space-y-12 animate-pop">
                        <h2 className="text-4xl font-black text-gray-800 border-b border-white pb-8 tracking-tighter italic">雲端神經中樞連線</h2>
                        <div className="card-pearl p-12 bg-white/40 space-y-10 shadow-inner rounded-[3rem]">
                            <div className="space-y-4">
                                <label className="text-[11px] font-black text-gray-400 ml-6 uppercase tracking-widest italic">Google Apps Script 網頁部署網址</label>
                                <input className="input-pearl w-full text-blue-600 font-bold text-lg" value={cloudUrl} onChange={(e) => handleCloudUrlChange(e.target.value)} placeholder="https://script.google.com/..."/>
                                <p className="text-[11px] text-blue-400 font-bold ml-6 italic">* 此網址為全系統通電關鍵，請確保已發佈為「任何人」均可存取。</p>
                            </div>
                            <div className="flex gap-6">
                                <button className="flex-1 py-8 bg-[#1C1C1E] text-[#D4AF37] rounded-[2rem] font-black shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-4 text-xl italic"><Icon name="upload-cloud" size={28}/> 雲端同步備份</button>
                                <button className="flex-1 py-8 bg-white border border-white rounded-[2rem] font-black text-gray-600 shadow-xl active:scale-95 transition-all flex items-center justify-center gap-4 text-xl italic"><Icon name="download-cloud" size={28}/> 抓取最新數據</button>
                            </div>
                        </div>
                    </div>
                )}
            </div>

            {/* 究極晶體彈窗 (Modal) - 包含 A/B 抽成與商品切換 */}
            {(tagModal.show || itemModal.show) && (
                <div className="fixed inset-0 bg-black/20 backdrop-blur-3xl z-[9000] flex items-center justify-center p-6 animate-fade-in">
                    <div className="crystal-modal w-full max-w-2xl p-16 animate-pop relative border-white">
                        <h3 className="text-4xl font-black text-gray-900 mb-12 text-center tracking-tighter italic uppercase">{tagModal.show ? tagModal.title : `制定${itemTab}細節`}</h3>
                        {tagModal.show ? (
                            <div className="space-y-12">
                                <input autoFocus className="input-pearl w-full text-center text-4xl font-black italic bg-white/50" value={tagInput} onChange={e=>setTagInput(e.target.value)} />
                                <div className="flex gap-6">
                                    <button onClick={()=>setTagModal({show:false})} className="flex-1 py-6 font-black text-gray-400 uppercase italic">Cancel</button>
                                    <button onClick={()=>{tagModal.callback(tagInput); setTagModal({show:false});}} className="flex-[2] py-6 bg-[#1C1C1E] text-[#D4AF37] rounded-[2rem] text-2xl font-black shadow-2xl active:scale-95 transition-all italic">確認存檔</button>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-8">
                                <div className="grid grid-cols-2 gap-8">
                                    <div className="col-span-2 space-y-2"><label className="text-[11px] font-black text-gray-400 ml-6 uppercase italic">項目名稱</label><input className="input-pearl w-full font-black text-2xl" value={itemForm.name} onChange={e=>setItemForm({...itemForm, name:e.target.value})}/></div>
                                    <div className="space-y-2"><label className="text-[11px] font-black text-gray-400 ml-6 uppercase italic">售價</label><input className="input-pearl w-full text-center text-[#D4AF37] text-4xl font-black italic" value={itemForm.price} onChange={e=>setItemForm({...itemForm, price:e.target.value})}/></div>
                                    {itemTab==='服務' ? (
                                        <div className="space-y-2 relative"><label className="text-[11px] font-black text-gray-400 ml-6 uppercase italic">分類</label>
                                            <div onClick={()=>setOpenDropdown(!openDropdown)} className="input-pearl flex justify-between items-center cursor-pointer bg-white font-black"><span>{itemForm.cat}</span><Icon name="chevron-down" color="#D4AF37" /></div>
                                            {openDropdown && <div className="crystal-menu shadow-2xl animate-pop"> {classes.map(c=><div key={c} onClick={()=>{setItemForm({...itemForm, cat:c}); setOpenDropdown(false);}} className="crystal-option">{c}</div>)}</div>}
                                        </div>
                                    ) : (
                                        <div className="space-y-2"><label className="text-[11px] font-black text-gray-400 ml-6 uppercase italic">成本</label><input className="input-pearl w-full text-center font-black" value={itemForm.cost} onChange={e=>setItemForm({...itemForm, cost:e.target.value})}/></div>
                                    )}
                                </div>
                                {itemTab === '服務' ? (
                                    <div className="p-10 bg-white/40 rounded-[3rem] border border-white space-y-8 shadow-inner">
                                        <div className="flex justify-between items-center"><span className="text-xs font-black text-gray-400 uppercase tracking-widest italic">Commission Mode</span>
                                        <div className="flex bg-gray-200/50 p-1 rounded-xl">
                                            <button onClick={()=>setItemForm({...itemForm, mode:'percent'})} className={`px-8 py-2 rounded-lg text-xs font-black ${itemForm.mode==='percent'?'bg-white shadow-md text-black':'text-gray-400'}`}>% 比例</button>
                                            <button onClick={()=>setItemForm({...itemForm, mode:'amount'})} className={`px-8 py-2 rounded-lg text-xs font-black ${itemForm.mode==='amount'?'bg-white shadow-md text-black':'text-gray-400'}`}>$ 金額</button></div></div>
                                        <div className="grid grid-cols-2 gap-8">
                                            <div><label className="text-[10px] font-black text-blue-500 uppercase italic block mb-3">師抽(A)</label><input className="input-pearl w-full text-center text-4xl font-black text-blue-600 bg-white/50" value={itemForm.commA} onChange={e=>setItemForm({...itemForm, commA:e.target.value})}/></div>
                                            <div><label className="text-[10px] font-black text-green-500 uppercase italic block mb-3">助抽(B)</label><input className="input-pearl w-full text-center text-4xl font-black text-green-600 bg-white/50" value={itemForm.commB} onChange={e=>setItemForm({...itemForm, commB:e.target.value})}/></div>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="p-10 bg-white/40 rounded-[2.5rem] border border-white shadow-inner flex flex-col items-center">
                                        <label className="text-[11px] font-black text-[#D4AF37] mb-4 uppercase tracking-widest italic">Profit Share (%)</label>
                                        <input className="input-pearl w-48 text-center text-6xl font-black text-[#D4AF37] bg-transparent" value={itemForm.comm} onChange={e=>setItemForm({...itemForm, comm:e.target.value})}/>
                                    </div>
                                )}
                                <div className="flex gap-6 pt-6"><button onClick={()=>setItemModal({show:false})} className="flex-1 py-6 font-black text-gray-400 uppercase italic">Cancel</button><button onClick={handleSaveItem} className="flex-[2] py-6 bg-[#1C1C1E] text-[#D4AF37] rounded-[2rem] text-2xl font-black shadow-2xl active:scale-95 transition-all italic uppercase">Save Settings</button></div>
                            </div>
                        )}
                    </div>
                </div>
            )}
        </div>
    );
};
 // ==========================================
// --- 核心旗艦 HairSalonApp (全功能回歸版) ---
// ==========================================
const HairSalonApp = () => {
    const [activeTab, setActiveTab] = useState('s1');
    const [records, setRecords] = useState([]);
    
    // ⚡️ 數據中心：顧客名單 (連動 S1 轉入)
    const [customers, setCustomers] = useState([
        { id: '1', name: '王大同', phone: '0912-345-678', staff: '小刀', tag: 'VIP', color: '#D4AF37', history: [] }
    ]);
    
    // ⚡️ 數據中心：人員名單 (連動 S1 設計師下拉)
    const [staffData, setStaffData] = useState([
        { id: '1', name: '小刀', role: '店長', baseSalary: 35000, commissionValue: 35, color: '#D4AF37' },
        { id: '2', name: 'Eason', role: '設計師', baseSalary: 28000, commissionValue: 30, color: '#5856D6' },
        { id: '3', name: 'A-Lin', role: '設計師', baseSalary: 28000, commissionValue: 30, color: '#FF2D55' }
    ]);

    // ⚡️ 數據中心：服務項目 (連動 S8 設定)
    const [serviceList, setServiceList] = useState([
        { id: 1, name: '精緻剪髮', price: 900, cat: '剪髮', commA: 40, commB: 10, mode: 'percent' },
        { id: 2, name: '洗髮服務', price: 300, cat: '洗髮', commA: 20, commB: 30, mode: 'percent' }
    ]);

    const staffList = useMemo(() => staffData.map(s => s.name), [staffData]);

    // ⚡️ 電路 1：處理開單結帳與雲端推送
    const onCheckout = async (record) => {
        setRecords([record, ...records]);
        const cloudUrl = localStorage.getItem('salon_cloud_url'); 
        if (cloudUrl) {
            try {
                fetch(cloudUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'OrderData', data: record })
                });
            } catch (e) { console.error("雲端寫入失敗"); }
        }
    };

    // ⚡️ 電路 2：處理「轉入」功能並自動存入 S4
    const onAddCustomer = (newCust) => {
        const fullCust = { ...newCust, id: Date.now().toString(), phone: '尚未填寫', birthday: '', visitCount: 0, totalSpend: 0, history: [], color: '#D4AF37' };
        setCustomers(prev => [...prev, fullCust]);
        
        const cloudUrl = localStorage.getItem('salon_cloud_url'); 
        if (cloudUrl) {
            fetch(cloudUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ type: 'Customers', data: fullCust }) });
        }
    };

    // ⚡️ 修正：補回消失的選單項目 (s5, s6, s7)
    const menuItems = [
        { id: 's1', name: '開單', icon: 'zap' },
        { id: 's2', name: '查單', icon: 'search' },
        { id: 's3', name: '報表', icon: 'activity' },
        { id: 's4', name: '顧客', icon: 'users' },
        { id: 's5', name: '庫存', icon: 'package' },
        { id: 's6', name: '人員', icon: 'user' },
        { id: 's7', name: '支出', icon: 'credit-card' },
        { id: 's8', name: '系統', icon: 'settings' }
    ];

    return (
        <div className="flex h-screen w-screen bg-[#F2F2F7] overflow-hidden">
            {/* 左側導覽列 */}
            <aside className="w-24 hover:w-64 bg-white/20 border-r border-gray-200 backdrop-blur-md transition-all duration-300 group overflow-hidden relative shrink-0">
                <div className="p-6 h-20 flex items-center gap-4 text-[#D4AF37] font-black text-3xl italic relative z-10">S</div>
                <nav className="flex-1 p-4 space-y-1 relative">
                    {menuItems.map(item => (
                        <button key={item.id} onClick={() => setActiveTab(item.id)} 
                            className={`w-full py-5 px-4 rounded-2xl flex items-center gap-5 relative z-10 transition-all ${activeTab === item.id ? 'bg-white shadow-xl text-black font-black' : 'text-gray-400 font-bold hover:bg-white/30'}`}>
                            <Icon name={item.icon} color={activeTab === item.id ? "#D4AF37" : "#8E8E93"} size={22}/>
                            <span className="opacity-0 group-hover:opacity-100 transition-all text-sm whitespace-nowrap italic">{item.name}</span>
                        </button>
                    ))}
                </nav>
            </aside>

            {/* 主顯示區 */}
            <main className="flex-1 p-6 overflow-hidden">
                <div className="flex-1 h-full liquid-glass p-12 flex flex-col relative bg-white/40 overflow-hidden shadow-2xl">
                    <div className="absolute -top-40 -right-40 w-96 h-96 bg-[#D4AF37]/10 blur-[120px] rounded-full pointer-events-none"></div>
                    
                    {/* 模組渲染：確保所有模組都獲得對應的數據接口 */}
                    {activeTab === 's1' && (<S1_OrderModule staffList={staffList} services={serviceList} onCheckout={onCheckout} setActiveTab={setActiveTab} onAddCustomer={onAddCustomer} customers={customers} />)}
                    {activeTab === 's2' && <S2_RecordTrackerModule records={records} onUpdateRecords={setRecords} staffList={staffList} />}
                    {activeTab === 's3' && <S3_ReportModule records={records} staffList={staffList} />}
                    {activeTab === 's4' && <S4_CustomerModule customers={customers} setCustomers={setCustomers} />}
                    {activeTab === 's5' && <S5_InventoryModule />}
                    {activeTab === 's6' && <S6_StaffModule staffData={staffData} setStaffData={setStaffData} />}
                    {activeTab === 's7' && <S7_ExpenseModule />}
                    {activeTab === 's8' && <S8_SystemModule services={serviceList} setServices={setServiceList} />}
                </div>
            </main>
        </div>
    );
};

        ReactDOM.createRoot(document.getElementById('root')).render(<HairSalonApp />);
    </script>
</body>
