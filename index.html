<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Salon POS - 黑金旗艦 2,000行全整合版</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { 
            --primary: #1C1C1E; 
            --accent: #D4AF37; 
            --bg-ios: #F2F2F7; 
            --glass-bg: rgba(255, 255, 255, 0.45); 
            --glass-blur: blur(35px) saturate(210%); 
        }
        body { font-family: -apple-system, 'Noto Sans TC', sans-serif; background: var(--bg-ios); margin: 0; overflow: hidden; -webkit-user-select: none; user-select: none; }
        *::-webkit-scrollbar { display: none !important; }

        /* --- 旗艦全景 UI 引擎 --- */
        .liquid-glass { position: relative; background: var(--glass-bg); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); border: 0.5px solid rgba(255, 255, 255, 0.7); border-top: 1.5px solid rgba(255, 255, 255, 0.9); border-radius: 2.5rem; box-shadow: 0 12px 45px rgba(0,0,0,0.04); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .glass-indicator { position: absolute; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(15px); border-radius: 1.25rem; transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.2); z-index: 0; pointer-events: none; }
        .crystal-menu { position: absolute; top: 110%; left: 0; right: 0; z-index: 9999; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(50px) saturate(250%); border: 1.5px solid rgba(255, 255, 255, 0.9); border-radius: 1.8rem; box-shadow: 0 25px 50px rgba(0,0,0,0.12); padding: 0.6rem; animation: crystalIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes crystalIn { from { opacity: 0; transform: translateY(-12px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .crystal-option { padding: 0.9rem 1.3rem; border-radius: 1.1rem; font-weight: 800; font-size: 14px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; cursor: pointer; color: #1C1C1E; }
        .crystal-option:hover { background: rgba(212, 175, 55, 0.1); color: #D4AF37; }
        .crystal-option.selected { background: #D4AF37; color: white; }
        .input-ios { width: 100%; background: rgba(255, 255, 255, 0.8); border: 1px solid #E5E5EA; border-radius: 1.25rem; padding: 0.8rem 1.25rem; outline: none; font-size: 15px; font-weight: 700; transition: 0.3s; }
        .input-ios:focus { background: white; border-color: #D4AF37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .text-gold-gradient { background: linear-gradient(135deg, #b8860b, #D4AF37, #fdf5e6, #D4AF37); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .pill-toggle { padding: 8px 18px; border-radius: 1rem; font-size: 12px; font-weight: 900; background: rgba(255, 255, 255, 0.5); border: 1px solid white; color: #8E8E93; transition: all 0.3s; }
        .pill-toggle.active { background: white; color: #D4AF37; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .receipt-container { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(40px) saturate(210%); border-radius: 2.5rem; border: 1.5px solid white; box-shadow: 0 40px 100px rgba(0,0,0,0.1); }
        .animate-fade-in { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* S3 專屬 */
        .nav-container { background: rgba(255, 255, 255, 0.6); padding: 6px; border-radius: 2rem; border: 1.5px solid white; display: flex; position: relative; z-index: 50; }
        .pearl-slider { position: absolute; top: 6px; bottom: 6px; background: rgba(245, 240, 225, 0.98); border-radius: 1.5rem; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); z-index: 10; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid rgba(212, 175, 55, 0.2); }
        .nav-item { position: relative; z-index: 20; padding: 12px 24px; font-size: 15px; font-weight: 900; cursor: pointer; text-align: center; color: #8E8E93; transition: 0.3s; }
        .nav-item.active { color: #1C1C1E; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const Icon = ({ name, size = 18, color = "currentColor", className = "" }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size, stroke: color, strokeWidth: '2.5px' }}></i>;
        };
 // ======================================================
// --- S1: 開單模組 (全平台自適應版：Mac/iPad/手機全兼容) ---
// ======================================================
const S1_OrderModule = ({ onCheckout, staffList, services, setActiveTab, onAddCustomer, customers }) => {
    const [orderDate, setOrderDate] = useState(new Date().toISOString().split('T')[0]);
    const [gender, setGender] = useState('女生');
    const [category, setCategory] = useState('全部');
    const [orderItems, setOrderItems] = useState([]);
    const [editingItem, setEditingItem] = useState(null); 
    const [customerType, setCustomerType] = useState('散客');
    const [searchQuery, setSearchQuery] = useState('');
    const [payMethod, setPayMethod] = useState('現金');
    const [cashIn, setCashIn] = useState('');
    const [selectedStaff, setSelectedStaff] = useState(staffList[0]);
    const [isStaffOpen, setIsStaffOpen] = useState(false);
    const [showReceipt, setShowReceipt] = useState(false);
    const [showConfirmModal, setShowConfirmModal] = useState(false);
    const [isProcessing, setIsProcessing] = useState(false);

    const suggestions = useMemo(() => {
        if (customerType !== '會員' || !searchQuery.trim() || !customers) return [];
        return customers.filter(c => (c.name && c.name.includes(searchQuery)) || (c.phone && c.phone.includes(searchQuery)));
    }, [searchQuery, customerType, customers]);

    const addItem = (s) => setOrderItems(prev => [...prev, { ...s, orderId: Date.now(), finalPrice: s.price, originalPrice: s.price, assistant: '無' }]);
    const totalAmount = orderItems.reduce((s, i) => s + i.finalPrice, 0);
    const change = cashIn ? Math.max(0, parseInt(cashIn) - totalAmount) : 0;

    const executeCheckout = async () => {
        if (isProcessing) return;
        setIsProcessing(true);
        const record = { id: Date.now().toString(), date: orderDate, customer: searchQuery || "一般散客", staff: selectedStaff, total: totalAmount, services: orderItems.map(i => i.name), payment: payMethod };
        await onCheckout(record);
        setTimeout(() => { setIsProcessing(false); setShowConfirmModal(false); setShowReceipt(true); setOrderItems([]); setSearchQuery(''); }, 500);
    };

    return (
        <div className="flex flex-col gap-4 md:gap-6 animate-fade-in relative pb-10">
            {/* 1. 頂部標題與日期 - 自適應排列 */}
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-end gap-4 shrink-0">
                <div>
                    <h1 className="text-4xl md:text-5xl font-black text-gold-gradient tracking-tighter italic">s1 開單結帳</h1>
                    <p className="text-gray-400 font-bold text-[10px] uppercase ml-1 opacity-60">Adaptive POS System</p>
                </div>
                <input type="date" className="input-ios w-full sm:w-44 text-xs font-black bg-white/60 border-white shadow-sm" value={orderDate} onChange={e => setOrderDate(e.target.value)} />
            </div>

            {/* 2. 主內容區：lg 以上並排，lg 以下堆疊 */}
            <div className="flex flex-col lg:flex-row gap-6">
                
                {/* 左側/頂部：服務選擇區 */}
                <div className="flex-[1.2] liquid-glass p-4 md:p-8 bg-white/20 flex flex-col min-w-0">
                    {/* 性別與分類按鈕：支援橫向捲動防止斷行 */}
                    <div className="flex flex-col gap-4 mb-6">
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                            {['男生', '女生', '小孩', '長輩'].map(t => (
                                <button key={t} onClick={() => setGender(t)} className={`pill-toggle whitespace-nowrap px-6 ${gender === t ? 'active' : ''}`}>{t}</button>
                            ))}
                        </div>
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2 border-b border-white/30">
                            {['全部', '洗髮', '剪髮', '燙髮', '染髮', '護理', '販賣'].map(c => (
                                <button key={c} onClick={() => setCategory(c)} className={`pill-toggle whitespace-nowrap px-6 ${category === c ? 'active' : ''}`}>{c}</button>
                            ))}
                        </div>
                    </div>

                    {/* 服務卡片網格：手機 2 欄，iPad/Mac 自動適應 */}
                    <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-2 xl:grid-cols-3 gap-3 md:gap-4 overflow-y-visible">
                        {services.filter(s => category === '全部' || s.cat === category).map(s => (
                            <button key={s.id} onClick={() => addItem(s)} className="service-card liquid-glass p-4 md:p-6 bg-white/40 hover:bg-white/80 text-left transition-all active:scale-95">
                                <span className="text-[9px] font-black text-gray-400 uppercase italic block mb-1 opacity-60">{s.cat}</span>
                                <h3 className="text-sm md:text-xl font-black text-[#1C1C1E] truncate">{s.name}</h3>
                                <b className="text-[#D4AF37] font-black text-lg">${s.price}</b>
                            </button>
                        ))}
                    </div>
                </div>

                {/* 右側/底部：結帳計算區 */}
                <div className="flex-1 liquid-glass p-4 md:p-8 bg-white/30 relative shadow-2xl flex flex-col min-h-[500px]">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-xl md:text-2xl font-black italic">結帳明細</h2>
                        <div className="flex bg-gray-200/40 p-1 rounded-xl shadow-inner shrink-0">
                            {['散客', '會員'].map(t => (
                                <button key={t} onClick={() => {setCustomerType(t); setSearchQuery('');}} className={`px-4 py-1.5 rounded-lg text-xs font-black transition-all ${customerType === t ? 'bg-white shadow-sm text-black' : 'text-gray-400'}`}>{t}</button>
                            ))}
                        </div>
                    </div>

                    {/* 設計師與搜尋列：手機堆疊，iPad 並排 */}
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6 items-end relative">
                        <div className="space-y-1 relative">
                            <label className="text-[9px] font-black text-gray-400 ml-4 uppercase">設計師</label>
                            <div onClick={() => setIsStaffOpen(!isStaffOpen)} className="input-ios cursor-pointer flex justify-between items-center bg-white shadow-sm border-white font-black">
                                <span className="truncate">{selectedStaff}</span><Icon name="chevron-down" size={16} color="#D4AF37" />
                            </div>
                            {isStaffOpen && (
                                <div className="crystal-menu shadow-2xl border-white overflow-y-auto max-h-[250px]">
                                    {staffList.map(s => (<div key={s} onClick={() => { setSelectedStaff(s); setIsStaffOpen(false); }} className="crystal-option">{s}</div>))}
                                </div>
                            )}
                        </div>
                        <div className="space-y-1 relative">
                            <label className="text-[9px] font-black text-gray-400 ml-4 uppercase">{customerType}搜尋</label>
                            <div className="flex gap-2">
                                <input className="input-ios font-black border-white shadow-sm" placeholder="名字..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                {customerType === '會員' && searchQuery && (
                                    <button onClick={() => { onAddCustomer({name: searchQuery}); setActiveTab('s4'); }} className="bg-green-500 text-white w-12 h-12 rounded-xl shadow-lg flex items-center justify-center shrink-0 active:scale-90">
                                        <Icon name="check" size={20}/>
                                    </button>
                                )}
                            </div>
                            {suggestions.length > 0 && (
                                <div className="absolute top-full left-0 right-0 z-[100] bg-white/95 backdrop-blur-xl mt-1 p-2 rounded-2xl shadow-2xl border border-white max-h-[200px] overflow-y-auto">
                                    {suggestions.map(c => (<div key={c.id} onClick={() => setSearchQuery(c.name)} className="p-3 hover:bg-gold/10 rounded-xl cursor-pointer flex justify-between items-center border-b border-gray-50 last:border-0">
                                        <b className="text-gray-800 text-sm">{c.name}</b><span className="text-[10px] text-gray-400 font-black">{c.phone}</span>
                                    </div>))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* 已選項目滾動區：設定固定高度防止無限拉長 */}
                    <div className="flex-1 overflow-y-auto space-y-3 mb-6 pr-1 max-h-[300px] lg:max-h-none">
                        {orderItems.length === 0 ? (
                            <div className="h-full flex flex-col items-center justify-center text-gray-300 italic opacity-40 py-10">
                                <Icon name="shopping-cart" size={40} className="mb-2"/>
                                <p className="text-sm font-black uppercase">Cart is Empty</p>
                            </div>
                        ) : orderItems.map(item => (
                            <div key={item.orderId} className="flex justify-between items-center bg-white/60 p-4 md:p-5 rounded-[2rem] border border-white shadow-sm transition-all hover:bg-white/80">
                                <div className="flex-1 min-w-0 mr-4">
                                    <div className="text-sm md:text-md font-black text-gray-800 italic truncate">{item.name}</div>
                                    <div className="text-[8px] text-blue-500 font-bold mt-1">助: {item.assistant}</div>
                                </div>
                                <div className="flex items-center gap-3 shrink-0">
                                    <b className="text-lg md:text-xl font-black text-[#D4AF37]">${item.finalPrice}</b>
                                    <div className="flex gap-1.5">
                                        <button onClick={() => setEditingItem(item)} className="w-8 h-8 bg-white rounded-full flex items-center justify-center text-gray-400 hover:text-blue-500 shadow-sm border border-white"><Icon name="edit-3" size={12}/></button>
                                        <button onClick={() => { if(window.confirm('移除項目？')) setOrderItems(orderItems.filter(i=>i.orderId!==item.orderId)) }} className="w-8 h-8 bg-white rounded-full flex items-center justify-center text-red-300 hover:text-red-500 shadow-sm border border-white"><Icon name="trash-2" size={12}/></button>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* 支付與總計 */}
                    <div className="pt-4 border-t border-white/50 shrink-0">
                        <div className="flex gap-2 mb-4 overflow-x-auto no-scrollbar pb-1">
                            {['現金', 'LinePay', '街口', '信用卡'].map(p => (
                                <button key={p} onClick={() => setPayMethod(p)} className={`px-5 py-2 rounded-xl text-[10px] font-black transition-all border shadow-sm whitespace-nowrap ${payMethod === p ? 'bg-black text-[#D4AF37] border-black' : 'bg-white text-gray-400 border-white'}`}>{p}</button>
                            ))}
                        </div>

                        {payMethod === '現金' && (
                            <div className="grid grid-cols-2 gap-4 mb-5 animate-fade-in">
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-gray-400 ml-4 italic">實收</label>
                                    <input className="input-ios text-xl font-black text-green-600 border-white shadow-inner bg-white/80" type="number" value={cashIn} onChange={e => setCashIn(e.target.value)} placeholder="$" />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[9px] font-black text-gray-400 ml-4 italic">找零</label>
                                    <div className="input-ios text-xl font-black text-red-500 border-white flex items-center bg-white/80">${change}</div>
                                </div>
                            </div>
                        )}

                        <div className="flex justify-between items-end mb-6 px-4">
                            <span className="text-gray-400 font-black text-xs uppercase italic tracking-widest">Total</span>
                            <span className="text-4xl md:text-6xl font-black text-gold-gradient tracking-tighter italic">
                                ${Number(totalAmount).toLocaleString()}
                            </span>
                        </div>

                        <div className="flex gap-3">
                            <button onClick={() => setShowReceipt(true)} className="w-16 h-16 md:w-20 md:h-20 btn-glass-white flex items-center justify-center text-[#D4AF37] shadow-xl border-white shrink-0 active:scale-95"><Icon name="qr-code" size={28}/></button>
                            <button onClick={() => { if(orderItems.length > 0) setShowConfirmModal(true); }} className="flex-1 py-4 md:py-6 bg-[#1C1C1E] text-[#D4AF37] rounded-[2rem] text-xl md:text-2xl font-black shadow-2xl active:scale-95 border border-white/10 transition-all uppercase italic">
                                Check Out
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            {/* 修改項目 Modal - 強化行動端高度適應 */}
            {editingItem && (
                <div className="fixed inset-0 bg-black/40 backdrop-blur-md z-[5000] flex items-center justify-center p-4">
                    <div className="liquid-glass w-full max-w-lg p-8 md:p-12 bg-[#F2F2F7] border-white shadow-2xl animate-fade-in max-h-[90vh] overflow-y-auto">
                        <h3 className="text-2xl font-black text-gold-gradient mb-10 text-center italic uppercase tracking-tighter">項目調整 Adjustment</h3>
                        <div className="space-y-8">
                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-gray-400 ml-5 uppercase">金額</label>
                                    <input className="input-ios text-2xl font-black text-[#D4AF37] bg-white shadow-sm" type="number" value={editingItem.finalPrice} onChange={e => setEditingItem({...editingItem, finalPrice: parseInt(e.target.value)||0})} />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-blue-500 ml-5 uppercase">協助助理</label>
                                    <select className="input-ios font-black bg-white shadow-sm h-[52px]" value={editingItem.assistant} onChange={e => setEditingItem({...editingItem, assistant: e.target.value})}>
                                        <option value="無">無</option>
                                        {staffList.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-6 pt-4">
                                <button onClick={()=>setEditingItem(null)} className="flex-1 py-5 font-black text-gray-400 uppercase italic">Cancel</button>
                                <button onClick={() => { setOrderItems(prev => prev.map(i => i.orderId === editingItem.orderId ? editingItem : i)); setEditingItem(null); }} className="flex-[2] py-5 bg-[#1C1C1E] text-[#D4AF37] rounded-[2rem] text-xl font-black shadow-xl uppercase italic">Apply</button>
                            </div>
                        </div>
                    </div>
                </div>
            )}
        </div>
    );
};
       // ======================================================
// --- S2: 查單模組 (全平台自適應版：Mac/iPad/手機全兼容) ---
// ======================================================
const S2_RecordTrackerModule = ({ records, onUpdateRecords, staffList }) => {
    const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
    const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);
    const [editingRec, setEditingRec] = useState(null);

    const handleDeleteRec = (id, name) => {
        if(window.confirm(`【二次確認】確定永久刪除「${name}」這筆單據嗎？`)) {
            onUpdateRecords(records.filter(r => r.id !== id));
        }
    };

    const handleSaveEdit = () => {
        onUpdateRecords(records.map(r => r.id === editingRec.id ? editingRec : r));
        setEditingRec(null);
    };

    return (
        <div className="flex h-full w-full flex-col gap-4 md:gap-6 animate-fade-in relative">
            {/* 1. 頂部標題與日期篩選 - 自適應堆疊 */}
            <div className="flex flex-col lg:flex-row justify-between items-start lg:items-end gap-4 md:gap-6 shrink-0">
                <div className="space-y-1">
                    <h1 className="text-4xl md:text-5xl font-black text-gold-gradient tracking-tighter italic">s2 查單對帳</h1>
                    <p className="text-gray-400 font-bold text-[10px] uppercase tracking-widest ml-1 opacity-60 italic">Revenue Audit System</p>
                </div>
                
                {/* 日期選擇器：寬度自適應 */}
                <div className="flex items-center gap-3 bg-white/40 p-3 md:p-4 rounded-[1.5rem] md:rounded-[2rem] border border-white shadow-sm w-full lg:w-auto">
                    <Icon name="calendar" size={16} color="#D4AF37" />
                    <input type="date" className="bg-transparent font-black text-xs md:text-sm outline-none flex-1" value={startDate} onChange={e=>setStartDate(e.target.value)} />
                    <span className="text-gray-300 font-black">~</span>
                    <input type="date" className="bg-transparent font-black text-xs md:text-sm outline-none flex-1" value={endDate} onChange={e=>setEndDate(e.target.value)} />
                </div>
            </div>

            {/* 2. 主內容顯示區：自適應內距 */}
            <div className="flex-1 liquid-glass p-4 md:p-10 flex flex-col min-h-0 bg-white/20">
                
                {/* 日結統計頭部 - 手機版改垂直佈局 */}
                <div className="flex flex-col sm:flex-row justify-between items-center gap-4 mb-8 border-b border-white/50 pb-8 shrink-0">
                    <h2 className="text-xl md:text-3xl font-black text-gray-800 tracking-tight italic">日結明細</h2>
                    <div className="text-center sm:text-right">
                        <span className="text-[10px] font-black text-gray-400 uppercase tracking-widest block mb-1 italic">Filtered Total</span>
                        <span className="text-4xl md:text-6xl font-black text-gold-gradient tracking-tighter italic">
                            ${records.reduce((s,r)=>s+r.total, 0).toLocaleString()}
                        </span>
                    </div>
                </div>

                {/* 單據列表滾動區 */}
                <div className="flex-1 overflow-y-auto space-y-4 md:space-y-6 pr-1 md:pr-2 no-scrollbar">
                    {records.length === 0 ? (
                        <div className="h-full flex flex-col items-center justify-center text-gray-300 italic opacity-50 py-20">

    ];

    return (
        <div className="flex h-screen w-screen bg-[#F2F2F7] overflow-hidden flex-col md:flex-row">
            {/* 響應式側邊欄：在手機變窄，在 iPad/Mac 可展開 */}
            <aside className="w-full md:w-24 hover:md:w-64 bg-white/20 border-b md:border-r border-gray-200 backdrop-blur-md transition-all duration-300 group overflow-hidden shrink-0 z-[100] flex md:flex-col">
                <div className="p-4 md:p-6 h-16 md:h-20 flex items-center gap-4 text-[#D4AF37] font-black text-2xl md:text-3xl italic">S</div>
                <nav className="flex-1 flex md:flex-col p-2 md:p-4 space-y-0 md:space-y-1 overflow-x-auto md:overflow-x-hidden no-scrollbar">
                    {menuItems.map(item => (
                        <button key={item.id} onClick={() => setActiveTab(item.id)} 
                            className={`flex-1 md:w-full py-3 md:py-5 px-3 md:px-4 rounded-xl md:rounded-2xl flex flex-col md:flex-row items-center gap-2 md:gap-5 transition-all ${activeTab === item.id ? 'bg-white shadow-xl text-black font-black scale-105' : 'text-gray-400 font-bold hover:bg-white/30'}`}>
                            <Icon name={item.icon} color={activeTab === item.id ? "#D4AF37" : "#8E8E93"} size={20}/>
                            <span className="text-[10px] md:text-sm whitespace-nowrap italic md:opacity-0 md:group-hover:opacity-100 transition-opacity">{item.name}</span>
                        </button>
                    ))}
                </nav>
            </aside>

            {/* 主內容區：自適應滾動 */}
            <main className="flex-1 p-2 md:p-6 overflow-hidden relative">
                <div className="h-full liquid-glass p-4 md:p-12 flex flex-col relative bg-white/40 overflow-hidden shadow-2xl">
                    <div className="absolute -top-40 -right-40 w-64 h-64 md:w-96 md:h-96 bg-[#D4AF37]/10 blur-[80px] md:blur-[120px] rounded-full pointer-events-none"></div>
                    
                    <div className="flex-1 overflow-y-auto no-scrollbar relative z-10">
                        {activeTab === 's1' && <S1_OrderModule staffList={staffList} services={serviceList} onCheckout={onCheckout} setActiveTab={setActiveTab} onAddCustomer={onAddCustomer} customers={customers} />}
                        {activeTab === 's2' && <S2_RecordTrackerModule records={records} onUpdateRecords={setRecords} staffList={staffList} />}
                        {activeTab === 's3' && <S3_ReportModule records={records} staffList={staffList} />}
                        {activeTab === 's4' && <S4_CustomerModule customers={customers} setCustomers={setCustomers} staffData={staffData} />}
                        {activeTab === 's5' && <S5_InventoryModule />}
                        {activeTab === 's6' && <S6_StaffModule staffData={staffData} setStaffData={setStaffData} />}
                        {activeTab === 's7' && <S7_ExpenseModule />}
                        {activeTab === 's8' && <S8_SystemModule services={serviceList} setServices={setServiceList} />}
                    </div>
                </div>
            </main>
        </div>
    );
};

        ReactDOM.createRoot(document.getElementById('root')).render(<HairSalonApp />);
    </script>
</body>
</html>
