<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Salon POS - 黑金1號 (Ultimate Liquid Glass)</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --primary: #1C1C1E;
            --accent: #D4AF37;
            --bg-ios: #F2F2F7;
            /* 核心：液態玻璃樣式變數 */
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-blur: blur(25px) saturate(210%);
            --glass-border: 0.5px solid rgba(255, 255, 255, 0.7);
            --glass-specular: 1.5px solid rgba(255, 255, 255, 0.9); /* 頂部高亮邊邊 */
        }

        body {
            font-family: -apple-system, 'Noto Sans TC', sans-serif;
            background: var(--bg-ios);
            margin: 0;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        *::-webkit-scrollbar { display: none !important; }

        /* --- 應用於所有項目的液態玻璃樣式 --- */
        .liquid-glass-item {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            border-top: var(--glass-specular); /* 水晶高亮邊緣 */
            border-radius: 2rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.04);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
            z-index: 1;
        }

        /* 側邊欄物理指示器 */
        .glass-indicator {
            position: absolute;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            border-radius: 1.25rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.2);
            z-index: 0; pointer-events: none;
        }

        .input-ios {
            width: 100%; background: rgba(255, 255, 255, 0.8); border: 1px solid #E5E5EA;
            border-radius: 1rem; padding: 0.85rem 1rem; outline: none; transition: all 0.2s;
            font-size: 16px;
        }
        .input-ios:focus { border-color: var(--accent); background: white; }

        .text-gold-gradient {
            background: linear-gradient(135deg, #b8860b, #D4AF37, #fdf5e6, #D4AF37);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .animate-fade-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const formatCurrency = (n) => new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0 }).format(n);

        const HairSalonApp = () => {
            const [activeTab, setActiveTab] = useState('人員');
            const [indicatorStyle, setIndicatorStyle] = useState({ top: 0, height: 0, width: 0, left: 0 });
            const [staffList, setStaffList] = useState([]);
            const [services, setServices] = useState([
                { id: 's1', name: '精緻剪髮', price: 600, category: '剪髮' },
                { id: 's2', name: '頭皮護理', price: 1200, category: '護理' },
                { id: 's3', name: '設計全染', price: 2500, category: '染燙' }
            ]);
            const btnRefs = useRef({});
            const [showAddModal, setShowAddModal] = useState(false);
            const [form, setForm] = useState({ name: '', role: '設計師', customRole: '', baseSalary: '', bonus: '', commissionType: '全店統一', commissionValue: '', color: '#D4AF37', note: '' });

            useEffect(() => {
                const activeBtn = btnRefs.current[activeTab];
                if (activeBtn) {
                    setIndicatorStyle({ top: activeBtn.offsetTop, left: activeBtn.offsetLeft, width: activeBtn.offsetWidth, height: activeBtn.offsetHeight });
                }
            }, [activeTab]);

            const handleSaveStaff = () => {
                if (!form.name.trim()) return alert("請輸入夥伴姓名");
                const newStaff = { ...form, id: Date.now().toString(), role: form.role === '其他' ? form.customRole : form.role };
                setStaffList(prev => [...prev, newStaff]);
                setShowAddModal(false);
                setForm({ name: '', role: '設計師', customRole: '', baseSalary: '', bonus: '', commissionType: '全店統一', commissionValue: '', color: '#D4AF37', note: '' });
            };

            const menuItems = ['開單', '查單', '報表', '顧客', '庫存', '人員', '系統'];

            return (
                <div className="flex h-screen w-screen overflow-hidden bg-[#F2F2F7]">
                    {/* 側邊欄 (本身就是大玻璃) */}
                    <aside style={{ minWidth: '120px' }} className="flex flex-col w-24 hover:w-64 bg-white/20 border-r border-gray-200 backdrop-blur-md transition-all duration-300 group overflow-hidden flex-shrink-0 relative">
                        <div className="p-6 h-20 flex items-center gap-4 border-b border-gray-200/30 relative z-10">
                            <div className="w-10 h-10 bg-black rounded-xl flex items-center justify-center text-[#D4AF37] font-black text-xl shadow-lg">S</div>
                            <span className="font-bold text-[#1C1C1E] opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Salon POS</span>
                        </div>
                        <nav className="flex-1 p-4 space-y-2 relative">
                            <div className="glass-indicator" style={{ top: indicatorStyle.top, left: indicatorStyle.left, width: indicatorStyle.width, height: indicatorStyle.height }}></div>
                            {menuItems.map(item => (
                                <button key={item} ref={el => btnRefs.current[item] = el} onClick={() => setActiveTab(item)} className={`w-full py-4 px-4 rounded-2xl flex items-center gap-4 menu-btn ${activeTab === item ? 'text-black font-bold' : 'text-gray-400'}`}>
                                    <div className={`w-6 h-6 rounded-md ${activeTab === item ? 'bg-[#D4AF37]/20' : 'bg-gray-300/30'}`}></div>
                                    <span className="opacity-0 group-hover:opacity-100 transition-all whitespace-nowrap">{item}</span>
                                </button>
                            ))}
                        </nav>
                    </aside>

                    {/* 主區域：所有框架都是液態玻璃 */}
                    <main className="flex-1 p-6 flex flex-col gap-6 overflow-hidden animate-fade-in">
                        {/* 開單頁面 (大哥原本的設定) */}
                        {activeTab === '開單' && (
                            <div className="flex flex-col lg:flex-row h-full gap-6 overflow-hidden">
                                {/* 服務選擇區 (玻璃化) */}
                                <div className="flex-1 liquid-glass-item flex flex-col overflow-hidden">
                                    <div className="p-6 border-b border-white/40 bg-white/20"><input className="input-ios" placeholder="搜尋項目..."/></div>
                                    <div className="flex-1 overflow-y-auto p-6 grid grid-cols-2 md:grid-cols-3 gap-6">
                                        {services.map(s => (
                                            <button key={s.id} className="text-left p-6 liquid-glass-item bg-white/50 hover:bg-white/90 active:scale-95 transition-all">
                                                <div className="text-xs text-accent font-black mb-1 uppercase tracking-widest">{s.category}</div>
                                                <h3 className="font-bold text-gray-800 text-xl mb-2">{s.name}</h3>
                                                <div className="text-gray-900 font-black text-2xl">{formatCurrency(s.price)}</div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                {/* 結帳清單 (玻璃化) */}
                                <div className="w-full lg:w-[400px] liquid-glass-item flex flex-col overflow-hidden">
                                    <div className="p-8 border-b border-white/40 bg-white/30 flex justify-between items-center"><span className="font-black text-2xl text-gray-800">結帳清單</span></div>
                                    <div className="flex-1 overflow-y-auto p-6 space-y-4">
                                        <div className="text-center text-gray-300 py-10">清單打磨中...</div>
                                    </div>
                                    <div className="p-8 bg-white/40 border-t border-white/40 rounded-b-3xl">
                                        <div className="flex justify-between items-end mb-8"><span className="text-gray-400 font-bold">TOTAL</span><span className="text-5xl font-black text-gold-gradient tracking-tighter">$0</span></div>
                                        <button className="w-full bg-black text-[#D4AF37] py-5 rounded-[1.5rem] text-xl font-black shadow-xl active:scale-95 transition-all">確認收款</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 人員管理 (大哥要求的玻璃卡片) */}
                        {activeTab === '人員' && (
                            <div className="flex-1 liquid-glass-item p-10 overflow-y-auto relative">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-4xl font-black text-gold-gradient tracking-tight">人員管理</h2>
                                    <button onClick={() => setShowAddModal(true)} className="bg-[#1C1C1E] text-[#D4AF37] px-8 py-3 rounded-2xl font-black shadow-lg hover:scale-105 transition-all">+ 新增夥伴</button>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 pb-10 pr-2">
                                    {staffList.map(staff => (
                                        <div key={staff.id} className="liquid-glass-item p-8 bg-white/60 animate-fade-in group hover:bg-white/90">
                                            {/* 大哥自訂顏色裝飾 */}
                                            <div className="absolute top-0 right-0 w-24 h-24 bg-opacity-10 rounded-bl-full" style={{ backgroundColor: staff.color }}></div>
                                            
                                            <div className="flex justify-between items-start mb-6">
                                                <div>
                                                    <span className="px-3 py-1 rounded-full text-[10px] font-bold text-white mb-2 inline-block shadow-sm" style={{ backgroundColor: staff.color }}>{staff.role}</span>
                                                    <h3 className="text-3xl font-black text-[#1C1C1E]">{staff.name}</h3>
                                                </div>
                                                <button className="p-2 bg-white rounded-full shadow-sm text-gray-300 hover:text-red-500 transition-colors">✕</button>
                                            </div>

                                            <div className="grid grid-cols-2 gap-y-3 text-xs font-bold text-gray-500 mb-6">
                                                <div className="flex flex-col"><span>底薪</span><b className="text-gray-800 text-lg">${staff.baseSalary}</b></div>
                                                <div className="flex flex-col text-right"><span>抽成比例</span><b className="text-[#D4AF37] text-lg">{staff.commissionType==='個別設定' ? `${staff.commissionValue}%` : '統一設定'}</b></div>
                                            </div>

                                            {/* 大哥的自訂備忘錄 */}
                                            <div className="p-4 bg-white/40 rounded-2xl border border-white border-dashed text-[11px] text-gray-500 leading-relaxed min-h-[50px]">
                                                <span className="font-black text-gray-400 block mb-1">備忘錄 / MEMO</span>
                                                {staff.note || '暫無內容'}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 新增夥伴 Modal (玻璃化) */}
                    {showAddModal && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-md z-[2000] flex items-center justify-center p-4">
                            <div className="liquid-glass-item w-full max-w-lg rounded-[2.5rem] p-10 bg-[#F2F2F7] animate-fade-in max-h-[90vh] overflow-y-auto">
                                <h3 className="text-2xl font-black mb-8 text-gold-gradient">建立新夥伴</h3>
                                <div className="space-y-5">
                                    <div className="grid grid-cols-2 gap-4">
                                        <input className="input-ios" placeholder="姓名" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} />
                                        <select className="input-ios" value={form.role} onChange={e=>setForm({...form, role:e.target.value})}>
                                            <option>設計師</option><option>助理</option><option>店長</option><option>其他</option>
                                        </select>
                                    </div>
                                    <input className="input-ios" placeholder="底薪" type="number" value={form.baseSalary} onChange={e=>setForm({...form, baseSalary:e.target.value})} />
                                    <div className="p-5 bg-white/60 rounded-3xl border border-white">
                                        <div className="flex gap-6 mb-3">
                                            <label className="flex items-center space-x-2 text-sm font-bold"><input type="radio" checked={form.commissionType === '全店統一'} onChange={()=>setForm({...form, commissionType:'全店統一'})}/> 全店統一</label>
                                            <label className="flex items-center space-x-2 text-sm font-bold"><input type="radio" checked={form.commissionType === '個別設定'} onChange={()=>setForm({...form, commissionType:'個別設定'})}/> 個別設定</label>
                                        </div>
                                        {form.commissionType === '個別設定' && <input type="number" placeholder="輸入抽成比例 %" className="input-ios animate-fade-in" value={form.commissionValue} onChange={e=>setForm({...form, commissionValue:e.target.value})}/>}
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <input type="color" className="w-12 h-10 bg-transparent cursor-pointer rounded-lg" value={form.color} onChange={e=>setForm({...form, color:e.target.value})} />
                                        <input className="input-ios" placeholder="備忘錄" value={form.note} onChange={e=>setForm({...form, note:e.target.value})} />
                                    </div>
                                    <div className="flex gap-4 pt-6 border-t border-gray-200">
                                        <button onClick={() => setShowAddModal(false)} className="flex-1 py-4 font-bold text-gray-400 hover:text-gray-600">取消</button>
                                        <button onClick={handleSaveStaff} className="flex-1 py-4 bg-[#1C1C1E] text-[#D4AF37] rounded-xl font-black shadow-xl active:scale-95 transition-all">確認存檔</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HairSalonApp />);
    </script>
</body>
</html>
